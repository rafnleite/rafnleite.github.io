<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Histograma de Gols - Copa 2026</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600;700&display=swap');

    :root {
      --bg-top: #f7f2e8;
      --bg-bottom: #dfebf8;
      --panel: rgba(255, 255, 255, 0.82);
      --panel-border: rgba(16, 27, 40, 0.12);
      --text: #101b28;
      --muted: #5a6b7d;
      --desempate: #ef8a17;
      --virada: #d7263d;
      --empate: #1c8c5e;
      --ampliando: #1e5bb5;
      --axis: #bbc8d6;
      --shadow: 0 14px 40px rgba(18, 37, 64, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 8% 12%, rgba(255, 196, 80, 0.28), transparent 38%),
        radial-gradient(circle at 92% 82%, rgba(49, 142, 214, 0.24), transparent 42%),
        linear-gradient(165deg, var(--bg-top), var(--bg-bottom));
      padding: 20px;
    }

    .wrap {
      width: 100%;
      max-width: none;
      margin: 0 auto;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      backdrop-filter: blur(6px);
      border-radius: 22px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .top {
      padding: 20px 22px 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: end;
      justify-content: space-between;
      border-bottom: 1px solid var(--panel-border);
    }

    .title {
      margin: 0;
      font-family: 'Bebas Neue', sans-serif;
      letter-spacing: 1px;
      font-size: clamp(30px, 5vw, 54px);
      line-height: 0.95;
      font-weight: 400;
    }

    .subtitle {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    .control-box {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #f7fbff;
      border: 1px solid var(--panel-border);
      border-radius: 12px;
      padding: 10px 12px;
    }

    .control-box label {
      font-size: 13px;
      color: var(--muted);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    select, input[type="file"] {
      border: 1px solid #b5c5d8;
      border-radius: 8px;
      padding: 6px 8px;
      background: #fff;
      color: var(--text);
      font: inherit;
      font-size: 14px;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 10px 22px 0;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid var(--panel-border);
      background: #fff;
      font-size: 13px;
      color: #29425a;
      cursor: pointer;
      user-select: none;
      transition: opacity 120ms ease, transform 120ms ease;
    }

    .legend-item:hover {
      transform: translateY(-1px);
    }

    .legend-item.is-off {
      opacity: 0.35;
    }

    .dot-preview {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      border: 1px solid rgba(0, 0, 0, 0.12);
    }

    .chart-area {
      padding: 14px 12px 12px;
      overflow-x: auto;
      overflow-y: hidden;
      position: relative;
    }

    .loading-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(247, 252, 255, 0.92);
      z-index: 5;
    }

    .loading-overlay.hidden {
      display: none;
    }

    .loading-box {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid var(--panel-border);
      background: #ffffff;
      color: #2a4560;
      font-size: 14px;
      font-weight: 700;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 2px solid #b7c9de;
      border-top-color: #1e5bb5;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .histogram {
      min-height: 420px;
      width: max-content;
      min-width: 100%;
      display: flex;
      flex-direction: column;
      gap: 5px;
      border-left: 3px solid #9eb3ca;
      padding: 10px 0 10px 0;
      position: relative;
    }

    .bin {
      display: grid;
      grid-template-columns: 132px auto;
      gap: 8px;
      align-items: center;
      min-height: 30px;
    }

    .dot-stack {
      display: flex;
      flex-wrap: nowrap;
      align-content: center;
      align-items: center;
      justify-content: flex-start;
      gap: 5px;
      width: max-content;
      padding: 4px 8px 4px 10px;
      min-height: 32px;
      border-radius: 0;
      background: transparent;
      border: none;
      border-bottom: 1px dashed rgba(158, 179, 202, 0.35);
      transition: transform 130ms ease;
    }

    .bin:hover .dot-stack {
      transform: translateX(2px);
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 1px solid rgba(0, 0, 0, 0.15);
      cursor: pointer;
      transition: transform 120ms ease;
    }

    .dot:hover {
      transform: scale(1.18);
    }

    .bin-label {
      text-align: left;
      font-size: 12px;
      font-weight: 700;
      color: #3b536b;
      line-height: 1.2;
      padding-left: 10px;
      justify-self: start;
      white-space: nowrap;
    }

    .status {
      padding: 8px 22px 18px;
      color: #2f4a62;
      font-size: 14px;
      font-weight: 600;
    }

    .tooltip {
      position: fixed;
      z-index: 999;
      pointer-events: none;
      background: #101b28;
      color: #f4fbff;
      border-radius: 10px;
      padding: 10px 11px;
      font-size: 12px;
      line-height: 1.35;
      width: min(300px, 86vw);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.28);
      opacity: 0;
      transform: translate(10px, -8px);
      transition: opacity 80ms ease;
    }

    .tooltip b {
      color: #ffd27f;
      font-weight: 700;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 760px) {
      body {
        padding: 10px;
      }

      .histogram {
        min-width: 100%;
        min-height: 350px;
      }

      .bin {
        grid-template-columns: 118px auto;
        min-height: 30px;
      }

      .dot {
        width: 10px;
        height: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <h1 class="title">Histograma de Gols</h1>
        <p class="subtitle">Copa do Mundo - bolinha por gol, da esquerda para a direita no tempo do jogo.</p>
      </div>
      <div class="controls">
        <div class="control-box">
          <label for="modeSelect">Faixas</label>
          <select id="modeSelect">
            <option value="15">15 minutos + acréscimos</option>
            <option value="5">5 minutos + acréscimos</option>
          </select>
        </div>
      </div>
    </div>

    <div class="legend">
      <button class="legend-item" data-classificacao="Desempate" type="button"><span class="dot-preview" style="background: var(--desempate)"></span>Desempate</button>
      <button class="legend-item" data-classificacao="Desempate - Virada" type="button"><span class="dot-preview" style="background: var(--virada)"></span>Desempate - Virada</button>
      <button class="legend-item" data-classificacao="Empate" type="button"><span class="dot-preview" style="background: var(--empate)"></span>Empate</button>
      <button class="legend-item" data-classificacao="Ampliando o placar" type="button"><span class="dot-preview" style="background: var(--ampliando)"></span>Ampliando o placar</button>
    </div>

    <div class="chart-area">
      <div id="initialLoading" class="loading-overlay">
        <div class="loading-box">
          <span class="spinner" aria-hidden="true"></span>
          <span>Carregando dados iniciais...</span>
        </div>
      </div>
      <div id="histogram" class="histogram"></div>
    </div>

    <div id="status" class="status">Carregando dados da API...</div>
  </div>

  <div id="tooltip" class="tooltip"></div>

  <script>
    const ESPN_SCOREBOARD_URL = 'https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard';
    const WORLD_CUP_START = new Date('2026-06-11T00:00:00');
    const WORLD_CUP_END = new Date('2026-07-19T23:59:59');
    const AUTO_REFRESH_MS = 0.2 * 60 * 1000;
    const FETCH_BATCH_SIZE = 5;

    const CLASS_COLORS = {
      'Desempate': 'var(--desempate)',
      'Desempate - Virada': 'var(--virada)',
      'Empate': 'var(--empate)',
      'Ampliando o placar': 'var(--ampliando)'
    };

    const modeSelect = document.getElementById('modeSelect');
    const histogram = document.getElementById('histogram');
    const statusEl = document.getElementById('status');
    const tooltip = document.getElementById('tooltip');
    const initialLoadingEl = document.getElementById('initialLoading');
    const legendItems = Array.from(document.querySelectorAll('.legend-item[data-classificacao]'));

    let allGoals = [];
    let activeClasses = new Set(Object.keys(CLASS_COLORS));
    let isLoading = false;
    let refreshTimer = null;
    let lastUpdatedAt = null;
    let hasLoadedOnce = false;

    function toYmd(d) {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}${m}${day}`;
    }

    function toIsoDate(d) {
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    }

    function dateRange(start, end) {
      const dates = [];
      const cur = new Date(start.getFullYear(), start.getMonth(), start.getDate());
      const last = new Date(end.getFullYear(), end.getMonth(), end.getDate());
      while (cur <= last) {
        dates.push(new Date(cur));
        cur.setDate(cur.getDate() + 1);
      }
      return dates;
    }

    function classifyGoal(preHome, preAway, postHome, postAway, scoringTeamId, homeId, teamWasTrailing) {
      if (postHome === postAway) {
        return 'Empate';
      }

      const scorerIsHome = scoringTeamId === homeId;
      const scorerWasTrailing = scorerIsHome ? preHome < preAway : preAway < preHome;
      const scorerWasLeading = scorerIsHome ? preHome > preAway : preAway > preHome;
      const scorerNowLeading = scorerIsHome ? postHome > postAway : postAway > postHome;

      if (scorerWasLeading) {
        return 'Ampliando o placar';
      }

      if (scorerNowLeading) {
        if (preHome === preAway) {
          return teamWasTrailing[scoringTeamId] ? 'Desempate - Virada' : 'Desempate';
        }
        return scorerWasTrailing ? 'Desempate - Virada' : 'Desempate';
      }

      return 'Empate';
    }

    function extractGoalsFromEvent(event) {
      const competition = (event.competitions || [])[0];
      if (!competition) return [];

      const competitors = competition.competitors || [];
      const home = competitors.find((c) => c.homeAway === 'home') || {};
      const away = competitors.find((c) => c.homeAway === 'away') || {};

      const homeId = String(home.id || '');
      const awayId = String(away.id || '');

      const teamNames = {};
      competitors.forEach((c) => {
        const id = String(c.id || '');
        teamNames[id] = c.team?.shortDisplayName || c.team?.displayName || id;
      });

      const partida = `${teamNames[homeId] || 'Mandante'} x ${teamNames[awayId] || 'Visitante'}`;
      const gameDate = String(event.date || '').split('T')[0] || '';

      let homeScore = 0;
      let awayScore = 0;
      const teamWasTrailing = { [homeId]: false, [awayId]: false };

      const goals = [];
      (competition.details || []).forEach((detail) => {
        if (!detail?.scoringPlay) return;
        if (detail?.shootout) return;

        const scoringTeamId = String(detail.team?.id || '');
        const scoreValue = Number.parseInt(detail.scoreValue || 1, 10) || 1;
        const preHome = homeScore;
        const preAway = awayScore;

        if (scoringTeamId === homeId) homeScore += scoreValue;
        else if (scoringTeamId === awayId) awayScore += scoreValue;
        else return;

        const scorer = Array.isArray(detail.athletesInvolved) && detail.athletesInvolved[0]
          ? detail.athletesInvolved[0].displayName || 'Desconhecido'
          : 'Desconhecido';

        const classification = classifyGoal(
          preHome,
          preAway,
          homeScore,
          awayScore,
          scoringTeamId,
          homeId,
          teamWasTrailing
        );

        goals.push({
          data_jogo: gameDate,
          partida,
          autor_gol: scorer,
          equipe_do_autor: teamNames[scoringTeamId] || scoringTeamId,
          minuto: detail.clock?.displayValue || '',
          placar_apos_gol: `${homeScore} x ${awayScore}`,
          tipo_lance: detail.type?.text || 'Goal',
          classificacao_gol: classification
        });

        if (homeScore > awayScore) teamWasTrailing[awayId] = true;
        if (awayScore > homeScore) teamWasTrailing[homeId] = true;
      });

      return goals;
    }

    async function fetchScoreboardByDate(day) {
      const url = `${ESPN_SCOREBOARD_URL}?dates=${toYmd(day)}`;
      const res = await fetch(url, { cache: 'no-store' });
      if (!res.ok) {
        throw new Error(`Erro HTTP ${res.status}`);
      }
      return res.json();
    }

    async function fetchAllGoalsFromApi() {
      const today = new Date();
      const end = today < WORLD_CUP_END ? today : WORLD_CUP_END;
      const days = dateRange(WORLD_CUP_START, end);

      const payloads = [];
      for (let i = 0; i < days.length; i += FETCH_BATCH_SIZE) {
        const batch = days.slice(i, i + FETCH_BATCH_SIZE);
        const results = await Promise.all(
          batch.map((day) => fetchScoreboardByDate(day).catch(() => ({ events: [] })))
        );
        payloads.push(...results);
      }

      const goals = [];
      payloads.forEach((payload) => {
        (payload.events || []).forEach((event) => {
          goals.push(...extractGoalsFromEvent(event));
        });
      });

      return goals;
    }

    function parseMinute(minuteRaw) {
      const raw = String(minuteRaw || '').trim();
      if (!raw) {
        return { base: 0, extra: 0, sortValue: 0, half: 1, isStoppage: false };
      }

      const normalized = raw.replace(/\s/g, '').replace(/’/g, "'").replace(/`/g, "'");
      const compact = normalized.replace(/'/g, '');
      const match = compact.match(/^(\d+)(?:\+(\d+))?$/);

      if (!match) {
        const fallbackNum = Number.parseInt(normalized, 10);
        const value = Number.isFinite(fallbackNum) ? fallbackNum : 0;
        return {
          base: value,
          extra: 0,
          sortValue: value,
          half: value <= 45 ? 1 : 2,
          isStoppage: false
        };
      }

      const base = Number.parseInt(match[1], 10);
      const extra = Number.parseInt(match[2] || '0', 10);
      const isStoppage = extra > 0 || base > 90;
      const half = base <= 45 ? 1 : 2;

      return {
        base,
        extra,
        half,
        isStoppage,
        sortValue: base + extra / 100
      };
    }

    function binDefinitions(mode) {
      if (mode === '5') {
        const bins = [];
        for (let start = 0; start <= 40; start += 5) {
          bins.push({
            id: `m-${start}`,
            label: `${start === 0 ? 0 : start + 1}-${start + 5}`,
            order: start,
            match(goal) {
              const p = goal._parsedMinute;
              if ((p.base === 45 && p.extra > 0) || p.base > 45) return false;
              const minute = p.base;
              const low = start === 0 ? 0 : start + 1;
              return minute >= low && minute <= start + 5;
            }
          });
        }

        bins.push({
          id: 'stoppage-1',
          label: 'Acréscimos 1T',
          order: 45.5,
          match(goal) {
            const p = goal._parsedMinute;
            return p.base === 45 && p.extra > 0;
          }
        });

        for (let start = 45; start <= 85; start += 5) {
          bins.push({
            id: `m2-${start}`,
            label: `${start + 1}-${start + 5}`,
            order: start + 1,
            match(goal) {
              const p = goal._parsedMinute;
              if (p.base > 90 || (p.base === 90 && p.extra > 0)) return false;
              const minute = p.base;
              return minute >= start + 1 && minute <= start + 5;
            }
          });
        }

        bins.push({
          id: 'stoppage-2',
          label: 'Acréscimos 2T',
          order: 90.9,
          match(goal) {
            const p = goal._parsedMinute;
            return (p.base === 90 && p.extra > 0) || p.base > 90;
          }
        });

        return bins.sort((a, b) => a.order - b.order);
      }

      return [
        {
          id: '0-15',
          label: '0-15',
          order: 15,
          match(goal) {
            const p = goal._parsedMinute;
            return p.base >= 0 && p.base <= 15;
          }
        },
        {
          id: '16-30',
          label: '16-30',
          order: 30,
          match(goal) {
            const p = goal._parsedMinute;
            return p.base >= 16 && p.base <= 30;
          }
        },
        {
          id: '31-45',
          label: '31-45',
          order: 45,
          match(goal) {
            const p = goal._parsedMinute;
            return p.base >= 31 && p.base <= 45 && p.extra === 0;
          }
        },
        {
          id: 'stoppage-1',
          label: 'Acréscimos 1T',
          order: 45.9,
          match(goal) {
            const p = goal._parsedMinute;
            return p.base === 45 && p.extra > 0;
          }
        },
        {
          id: '46-60',
          label: '46-60',
          order: 60,
          match(goal) {
            const p = goal._parsedMinute;
            return p.base >= 46 && p.base <= 60;
          }
        },
        {
          id: '61-75',
          label: '61-75',
          order: 75,
          match(goal) {
            const p = goal._parsedMinute;
            return p.base >= 61 && p.base <= 75;
          }
        },
        {
          id: '76-90',
          label: '76-90',
          order: 90,
          match(goal) {
            const p = goal._parsedMinute;
            return p.base >= 76 && p.base <= 90 && p.extra === 0;
          }
        },
        {
          id: 'stoppage-2',
          label: 'Acréscimos 2T',
          order: 90.9,
          match(goal) {
            const p = goal._parsedMinute;
            return (p.base === 90 && p.extra > 0) || p.base > 90;
          }
        }
      ];
    }

    function goalClass(goal) {
      return goal.classificacao_gol || goal.calssificacao_gol || 'Desempate';
    }

    function groupByBins(goals, bins) {
      const groups = bins.map((bin) => ({ bin, goals: [] }));

      goals.forEach((g) => {
        const found = groups.find((bucket) => bucket.bin.match(g));
        if (found) found.goals.push(g);
      });

      groups.forEach((bucket) => {
        bucket.goals.sort((a, b) => a._parsedMinute.sortValue - b._parsedMinute.sortValue);
      });

      return groups;
    }

    function tooltipHtml(goal) {
      const cls = goalClass(goal);
      return [
        `<div><b>${goal.autor_gol || 'Desconhecido'}</b> (${goal.equipe_do_autor || '-'})</div>`,
        `<div>${goal.partida || '-'}</div>`,
        `<div>Minuto: <b>${goal.minuto || '-'}</b></div>`,
        `<div>Placar: <b>${goal.placar_apos_gol || '-'}</b></div>`,
        `<div>Classificação: <b>${cls}</b></div>`,
        `<div>Data: ${goal.data_jogo || '-'}</div>`
      ].join('');
    }

    function showTooltip(evt, goal) {
      tooltip.innerHTML = tooltipHtml(goal);
      tooltip.style.opacity = '1';
      const x = evt.clientX + 12;
      const y = evt.clientY - 16;
      tooltip.style.left = `${x}px`;
      tooltip.style.top = `${y}px`;
    }

    function hideTooltip() {
      tooltip.style.opacity = '0';
    }

    function render(goals) {
      const mode = modeSelect.value;
      const filteredGoals = goals.filter((g) => activeClasses.has(goalClass(g)));
      const bins = binDefinitions(mode);
      const groups = groupByBins(filteredGoals, bins);
      const maxGoalsInBin = groups.reduce((max, g) => Math.max(max, g.goals.length), 0);

      histogram.innerHTML = '';
      histogram.style.width = 'max-content';
      histogram.style.minWidth = '100%';
      histogram.style.maxWidth = 'none';
      histogram.style.minInlineSize = `${Math.max(820, 160 + maxGoalsInBin * 18)}px`;

      groups.forEach(({ bin, goals: bucketGoals }) => {
        const col = document.createElement('section');
        col.className = 'bin';

        const stack = document.createElement('div');
        stack.className = 'dot-stack';

        bucketGoals.forEach((g) => {
          const dot = document.createElement('div');
          dot.className = 'dot';
          dot.style.background = CLASS_COLORS[goalClass(g)] || '#7e8a9a';

          dot.addEventListener('mouseenter', (evt) => showTooltip(evt, g));
          dot.addEventListener('mousemove', (evt) => showTooltip(evt, g));
          dot.addEventListener('mouseleave', hideTooltip);

          stack.appendChild(dot);
        });

        const label = document.createElement('div');
        label.className = 'bin-label';
        label.textContent = `${bin.label} (${bucketGoals.length})`;

        col.appendChild(label);
        col.appendChild(stack);
        histogram.appendChild(col);
      });

      const last = lastUpdatedAt
        ? ` | ultima atualizacao: ${lastUpdatedAt.toLocaleTimeString('pt-BR')}`
        : '';
      statusEl.textContent = `${filteredGoals.length} gols exibidos em ${bins.length} faixas (${mode} min)${last}.`;
    }

    function prepareGoals(records) {
      return records
        .map((r) => ({ ...r, _parsedMinute: parseMinute(r.minuto) }))
        .sort((a, b) => a._parsedMinute.sortValue - b._parsedMinute.sortValue);
    }

    async function refreshData() {
      if (isLoading) return;
      isLoading = true;
      if (!hasLoadedOnce) {
        initialLoadingEl.classList.remove('hidden');
      }
      statusEl.textContent = 'Atualizando dados da API...';

      try {
        const goals = await fetchAllGoalsFromApi();
        allGoals = prepareGoals(goals);
        lastUpdatedAt = new Date();
        render(allGoals);
      } catch (err) {
        const message = err instanceof Error ? err.message : 'erro desconhecido';
        statusEl.textContent = `Falha ao atualizar da API (${message}).`;
      } finally {
        if (!hasLoadedOnce) {
          hasLoadedOnce = true;
          initialLoadingEl.classList.add('hidden');
        }
        isLoading = false;
      }
    }

    function startAutoRefresh() {
      if (refreshTimer) {
        clearInterval(refreshTimer);
      }
      refreshTimer = setInterval(() => {
        refreshData();
      }, AUTO_REFRESH_MS);
    }

    async function init() {
      await refreshData();
      startAutoRefresh();
    }

    modeSelect.addEventListener('change', () => {
      if (allGoals.length) render(allGoals);
    });

    legendItems.forEach((item) => {
      item.addEventListener('click', () => {
        const className = item.dataset.classificacao;
        if (!className) return;

        if (activeClasses.has(className)) {
          activeClasses.delete(className);
        } else {
          activeClasses.add(className);
        }

        if (activeClasses.size === 0) {
          activeClasses = new Set(Object.keys(CLASS_COLORS));
        }

        legendItems.forEach((legendItem) => {
          const key = legendItem.dataset.classificacao;
          legendItem.classList.toggle('is-off', !activeClasses.has(key));
        });

        render(allGoals);
      });
    });

    window.addEventListener('scroll', hideTooltip, { passive: true });
    window.addEventListener('resize', hideTooltip);

    init();
  </script>
</body>
</html>
