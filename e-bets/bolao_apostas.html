<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bolão Copa 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;800&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f0f2f5;
  --white: #ffffff;
  --border: #e0e3ea;
  --text: #111827;
  --sub: #6b7280;
  --light: #adb5c0;
  --accent: #166534;
  --accent-light: #dcfce7;
  --col-a: #1d4ed8;
  --col-emp: #92400e;
  --col-b: #b91c1c;
  --radius: 14px;
}

html, body {
  min-height: 100vh;
  background: var(--bg);
  font-family: 'Inter', sans-serif;
  color: var(--text);
}

/* ── PAGE HEADER ─────────────────────────── */
.page-header {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  padding: 12px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  flex-wrap: wrap;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 1px 4px rgba(0,0,0,.06);
}
.logo-title h1 {
  font-family: 'Bebas Neue', cursive;
  font-size: 1.35rem;
  letter-spacing: 3px;
  color: var(--accent);
}
.logo-title p {
  font-size: 0.62rem;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--sub);
  margin-top: 1px;
}
.header-nav {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.nav-btn {
  background: var(--white);
  border: 1.5px solid var(--border);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 0.78rem;
  font-weight: 600;
  padding: 6px 13px;
  border-radius: 7px;
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
}
.nav-btn:hover:not(:disabled) {
  background: var(--accent);
  border-color: var(--accent);
  color: white;
}
.nav-btn:disabled { opacity: .35; cursor: not-allowed; }
.nav-select {
  background: var(--white);
  border: 1.5px solid var(--border);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 0.78rem;
  padding: 6px 11px;
  border-radius: 7px;
  cursor: pointer;
  max-width: 280px;
  width: 100%;
  outline: none;
}
.nav-select:focus { border-color: var(--accent); }
.nav-counter {
  font-size: 0.72rem;
  color: var(--sub);
  font-weight: 500;
  white-space: nowrap;
}
.btn-img {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--accent);
  border: none;
  color: white;
  font-family: 'Inter', sans-serif;
  font-size: 0.78rem;
  font-weight: 600;
  padding: 6px 14px;
  border-radius: 7px;
  cursor: pointer;
  transition: opacity .15s;
  white-space: nowrap;
}
.btn-img:hover { opacity: .85; }

/* ── MAIN ─────────────────────────────────── */
.content {
  max-width: 760px;
  margin: 0 auto;
  padding: 28px 16px 72px;
}

/* ── GAME CARD ─────────────────────────────── */
#game-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: 0 2px 12px rgba(0,0,0,.06);
}

/* ── GAME HEADER ──────────────────────────── */
.game-header {
  padding: 18px 22px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 7px;
}
.gh-top {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
}
.pill {
  display: inline-flex;
  align-items: center;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 0.62rem;
  font-weight: 700;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  background: var(--accent-light);
  color: var(--accent);
}
.gh-meta {
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
  justify-content: center;
}
.meta-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 0.78rem;
  color: var(--sub);
}
.meta-item strong { color: var(--text); font-weight: 600; }

/* ── TEAMS ────────────────────────────────── */
.teams-section {
  padding: 26px 22px 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-bottom: 1px solid var(--border);
  background: var(--white);
}
.team-block {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}
.team-flag {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid var(--border);
  display: block;
  background: var(--bg);
}
.team-name {
  font-size: 0.95rem;
  font-weight: 800;
  text-align: center;
  letter-spacing: .5px;
  text-transform: uppercase;
  line-height: 1.15;
}
.team-count {
  font-size: 0.63rem;
  font-weight: 600;
  color: var(--light);
  letter-spacing: .5px;
  text-transform: uppercase;
}
.vs-center {
  flex-shrink: 0;
  padding: 0 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
}
.vs-text {
  font-family: 'Bebas Neue', cursive;
  font-size: 1.8rem;
  letter-spacing: 4px;
  color: var(--border);
  line-height: 1;
}
.score-real {
  font-family: 'Bebas Neue', cursive;
  font-size: 1.5rem;
  letter-spacing: 3px;
  color: var(--text);
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 2px 12px;
  line-height: 1.3;
}
.emp-count {
  font-size: 0.63rem;
  color: var(--light);
  letter-spacing: .8px;
  text-transform: uppercase;
  font-weight: 600;
}

/* ── BETS COLUMNS ─────────────────────────── */
.bets-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
}
.bet-col {
  border-right: 1px solid var(--border);
}
.bet-col:last-child { border-right: none; }

.bet-col-head {
  padding: 11px 14px;
  border-bottom: 1px solid var(--border);
  text-align: center;
}
.bch-label {
  font-size: 0.58rem;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--light);
  display: block;
  margin-bottom: 2px;
}
.bch-team {
  font-size: 0.78rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .4px;
  display: block;
}
.bch-team-a   { color: var(--col-a); }
.bch-team-emp { color: var(--col-emp); }
.bch-team-b   { color: var(--col-b); }
.bch-count {
  font-size: 0.58rem;
  color: var(--light);
  font-weight: 500;
  display: block;
  margin-top: 2px;
}

/* ── BET ROWS ─────────────────────────────── */
.bet-list { list-style: none; }
.bet-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 13px;
  border-bottom: 1px solid var(--border);
  gap: 6px;
}
.bet-item:last-child { border-bottom: none; }
.bi-name {
  font-size: 0.77rem;
  font-weight: 500;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  min-width: 0;
}
.bi-score {
  font-family: 'Bebas Neue', cursive;
  font-size: 0.92rem;
  letter-spacing: 1.5px;
  flex-shrink: 0;
}
.bi-score-a   { color: var(--col-a); }
.bi-score-emp { color: var(--col-emp); }
.bi-score-b   { color: var(--col-b); }

.empty-bet {
  padding: 18px 12px;
  text-align: center;
  font-size: 0.68rem;
  color: var(--border);
  letter-spacing: 1px;
  text-transform: uppercase;
  font-weight: 600;
}

/* ── STATS BAR ────────────────────────────── */
.stats-bar {
  padding: 13px 22px;
  border-top: 1px solid var(--border);
  background: var(--bg);
  border-radius: 0 0 var(--radius) var(--radius);
}
.stats-track {
  height: 7px;
  border-radius: 4px;
  overflow: hidden;
  background: var(--border);
  display: flex;
  margin-bottom: 7px;
}
.seg-a   { background: var(--col-a);  transition: width .4s; }
.seg-emp { background: #d97706;       transition: width .4s; }
.seg-b   { background: var(--col-b);  transition: width .4s; }
.stats-labels {
  display: flex;
  justify-content: space-between;
  font-size: 0.65rem;
  font-weight: 600;
}
.sl-a   { color: var(--col-a); }
.sl-emp { color: #92400e; }
.sl-b   { color: var(--col-b); }

/* ── SEARCH BOX ──────────────────────────── */
.search-wrap {
  position: relative;
  width: 280px;
  flex-shrink: 0;
}
.search-input {
  width: 100%;
  background: var(--white);
  border: 1.5px solid var(--border);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 0.78rem;
  padding: 6px 32px 6px 30px;
  border-radius: 7px;
  outline: none;
  transition: border-color .15s;
}
.search-input:focus { border-color: var(--accent); }
.search-icon {
  position: absolute;
  left: 9px;
  top: 50%;
  transform: translateY(-50%);
  pointer-events: none;
  color: var(--light);
}
.search-clear {
  position: absolute;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  cursor: pointer;
  color: var(--light);
  font-size: 1rem;
  line-height: 1;
  padding: 0;
  display: none;
}
.search-clear:hover { color: var(--text); }
.search-dropdown {
  position: absolute;
  top: calc(100% + 5px);
  left: 0;
  right: 0;
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: 9px;
  box-shadow: 0 8px 24px rgba(0,0,0,.12);
  max-height: 320px;
  overflow-y: auto;
  z-index: 200;
  display: none;
}
.search-dropdown.open { display: block; }
.sd-item {
  padding: 9px 13px;
  font-size: 0.78rem;
  cursor: pointer;
  border-bottom: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 1px;
}
.sd-item:last-child { border-bottom: none; }
.sd-item:hover, .sd-item.active { background: var(--accent-light); }
.sd-teams {
  font-weight: 700;
  color: var(--text);
}
.sd-teams mark {
  background: #fef08a;
  color: var(--text);
  border-radius: 2px;
  padding: 0 1px;
}
.sd-meta {
  font-size: 0.66rem;
  color: var(--sub);
  font-weight: 400;
}
.sd-empty {
  padding: 14px 13px;
  font-size: 0.75rem;
  color: var(--sub);
  text-align: center;
}

/* ── RESPONSIVE ───────────────────────────── */
@media (max-width: 520px) {
  .team-flag { width: 54px; height: 54px; }
  .team-name { font-size: .82rem; }
  .bet-item  { padding: 7px 9px; }
  .bi-name   { font-size: .7rem; }
}
</style>
</head>

const WEEKDAY   = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const MONTH_BR  = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];

function formatDate(s) {
  if (!s) return '—';
  const d = new Date(s.replace(' ', 'T') + ':00');
  const h = String(d.getHours()).padStart(2, '0');
  const m = d.getMinutes();
  const mStr = m ? String(m).padStart(2, '0') : '';
  return WEEKDAY[d.getDay()] + ', ' + d.getDate() + ' de ' + MONTH_BR[d.getMonth()] + ' · ' + h + 'h' + mStr;
}

function pct(n, t) { return t === 0 ? 0 : Math.round(n / t * 100); }

function shortName(name) {
  if (!name) return '—';
  const p = name.trim().split(' ');
  if (p.length === 1) return name;
  const f = p[0], l = p[p.length - 1];
  return (f.length + l.length <= 17) ? (f + ' ' + l) : (f + ' ' + l[0] + '.');
}

function betItem(ap, type) {
  return '<li class="bet-item"><span class="bi-name">' + shortName(ap.nome) +
    '</span><span class="bi-score bi-score-' + type + '">' + ap.placar + '</span></li>';
}

function parsePlacar(placar) {
  var parts = (placar || '0x0').split('x');
  return { a: parseInt(parts[0]) || 0, b: parseInt(parts[1]) || 0 };
}

// Sort: 1) maior saldo de gols desc; 2) mais gols do vencedor desc; 3) alfabético
function sortBets(list, type) {
  return list.slice().sort(function(x, y) {
    var px = parsePlacar(x.placar), py = parsePlacar(y.placar);
    var sdx, sdy, vx, vy;
    if (type === 'a') {
      sdx = px.a - px.b; sdy = py.a - py.b;
      vx  = px.a;        vy  = py.a;
    } else if (type === 'b') {
      sdx = px.b - px.a; sdy = py.b - py.a;
      vx  = px.b;        vy  = py.b;
    } else { // empate
      sdx = px.a; sdy = py.a;
      vx  = px.a; vy  = py.a;
    }
    if (sdy !== sdx) return sdy - sdx;
    if (vy  !== vx)  return vy  - vx;
    return x.nome.localeCompare(y.nome, 'pt-BR', { sensitivity: 'base' });
  });
}

function flagImg(team, cls) {
  if (!team.logo) return '<div class="team-flag" style="display:flex;align-items:center;justify-content:center;font-size:1.6rem">🏴</div>';
  return '<img class="team-flag ' + cls + '" src="' + team.logo + '" alt="' + team.nome + '">';
}

        ds = d.getDate() + ' de ' + MONTH_BR[d.getMonth()];
      }
      const teams = highlight(m.j.time_a.nome + ' × ' + m.j.time_b.nome, term);
      return '<div class="sd-item" data-idx="' + m.i + '" data-pos="' + pos + '">' +
        '<span class="sd-teams">' + teams + '</span>' +
        '<span class="sd-meta">' + ds + (m.j.grupo ? ' · Grupo ' + m.j.grupo : '') + (m.j.cidade ? ' · ' + m.j.cidade : '') + '</span>' +
        '</div>';
    }).join('');
  }

  activeDropdownIdx = -1;
  searchDropdown.classList.add('open');
}

function closeDropdown() {
  searchDropdown.classList.remove('open');
  activeDropdownIdx = -1;
}

function clearSearch() {
  searchInput.value = '';
  searchClear.style.display = 'none';
  closeDropdown();
  searchInput.focus();
}

searchInput.addEventListener('input', function() {
  const q = searchInput.value;
  searchClear.style.display = q ? 'block' : 'none';
  if (q.trim()) {
    openDropdown(q);
  } else {
    closeDropdown();
  }
});

searchInput.addEventListener('focus', function() {
  if (searchInput.value.trim()) openDropdown(searchInput.value);
});

searchInput.addEventListener('keydown', function(e) {
  const items = searchDropdown.querySelectorAll('.sd-item');
  if (!items.length) return;
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    activeDropdownIdx = Math.min(activeDropdownIdx + 1, items.length - 1);
    items.forEach(function(el, i) { el.classList.toggle('active', i === activeDropdownIdx); });
    items[activeDropdownIdx].scrollIntoView({ block: 'nearest' });
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    activeDropdownIdx = Math.max(activeDropdownIdx - 1, 0);
    items.forEach(function(el, i) { el.classList.toggle('active', i === activeDropdownIdx); });
    items[activeDropdownIdx].scrollIntoView({ block: 'nearest' });
  } else if (e.key === 'Enter') {
    if (activeDropdownIdx >= 0) {
      const el = items[activeDropdownIdx];
      selectFromDropdown(parseInt(el.dataset.idx), el.textContent.trim());
    } else if (items.length === 1) {
      selectFromDropdown(parseInt(items[0].dataset.idx), items[0].querySelector('.sd-teams').textContent.trim());
    }
  } else if (e.key === 'Escape') {
    closeDropdown();
  }
});

searchDropdown.addEventListener('mousedown', function(e) {
  const item = e.target.closest('.sd-item');
  if (!item) return;
  e.preventDefault();
  selectFromDropdown(parseInt(item.dataset.idx), item.querySelector('.sd-teams').textContent.trim());
});

document.addEventListener('click', function(e) {
  if (!document.getElementById('search-wrap').contains(e.target)) closeDropdown();
});

function selectFromDropdown(idx, labelText) {
  currentIndex = idx;
  // strip HTML tags from label
  searchInput.value = JOGOS[idx].time_a.nome + ' × ' + JOGOS[idx].time_b.nome;
  searchClear.style.display = 'block';
  closeDropdown();
  renderGame(currentIndex);
  updateNav();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function navigate(dir) {
  const n = currentIndex + dir;
  if (n < 0 || n >= JOGOS.length) return;
  currentIndex = n;
  renderGame(currentIndex);
  updateNav();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function updateNav() {
  document.getElementById('btn-prev').disabled = (currentIndex === 0);
  document.getElementById('btn-next').disabled = (currentIndex === JOGOS.length - 1);
  document.getElementById('nav-counter').textContent = (currentIndex + 1) + ' / ' + JOGOS.length;
  const j = JOGOS[currentIndex];
  searchInput.value = j.time_a.nome + ' × ' + j.time_b.nome;
  searchClear.style.display = 'block';
}

function imgToDataURL(img) {
  return new Promise(function(resolve) {
    if (!img.src || img.src.startsWith('data:')) { resolve(); return; }
    const original = img.src;
    // Render as a square canvas mimicking object-fit: cover
    const size = 140; // 70px * scale:2
    const canvas = document.createElement('canvas');
    canvas.width = size;
    canvas.height = size;
    const ctx = canvas.getContext('2d');
    const ci = new Image();
    ci.crossOrigin = 'anonymous';
    ci.onload = function() {
      const iw = ci.naturalWidth  || ci.width;
      const ih = ci.naturalHeight || ci.height;
      // object-fit: cover — scale so shorter side fills, then center-crop
      const scale = Math.max(size / iw, size / ih);
      const sw = iw * scale;
      const sh = ih * scale;
      const sx = (size - sw) / 2;
      const sy = (size - sh) / 2;
      try {
        ctx.drawImage(ci, sx, sy, sw, sh);
        img.src = canvas.toDataURL('image/png');
      } catch(e) {
        img.style.visibility = 'hidden';
      }
      resolve();
    };
    ci.onerror = function() { img.style.visibility = 'hidden'; resolve(); };
    ci.src = original + (original.includes('?') ? '&' : '?') + '_cb=' + Date.now();
  });
}

function exportImage() {
  const card = document.getElementById('game-card');
  const j = JOGOS[currentIndex];
  const fname = 'bolao_jogo' + j.id + '_' + j.time_a.nome.replace(/ /g, '-') + '_x_' + j.time_b.nome.replace(/ /g, '-') + '.png';

  // Convert all flag images to inline data URLs first
  const imgs = Array.from(card.querySelectorAll('img.team-flag'));
  const origSrcs = imgs.map(function(img) { return img.src; });

  Promise.all(imgs.map(imgToDataURL)).then(function() {
    html2canvas(card, {
      scale: 2,
      useCORS: false,
      allowTaint: false,
      backgroundColor: '#ffffff',
      logging: false
    }).then(function(canvas) {
      // Restore original src values
      imgs.forEach(function(img, i) {
        img.src = origSrcs[i];
        img.style.visibility = '';
      });
      const a = document.createElement('a');
      a.download = fname;
      a.href = canvas.toDataURL('image/png');
      a.click();
    });
  });
}

buildSelect();
renderGame(0);
updateNav();
</script>
