<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>e-BÉTS - Apostas</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="bolao_header.js"></script>
<link rel="stylesheet" href="bolao_styles.css">
<style>
:root {
  --col-a: #1d4ed8;
  --col-emp: #92400e;
  --col-b: #b91c1c;
}
/* ── GAME NAV BAR ─────────────────────────── */
.game-nav-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 14px;
}
.gnb-controls {
  display: flex;
  align-items: center;
  gap: 8px;
  flex: 1;
  min-width: 0;
  width: 100%;
}

/* ── MAIN ─────────────────────────────────── */
.content {
  max-width: 760px;
  margin: 0 auto;
  padding: 28px 16px 72px;
}

/* ── GAME CARD ─────────────────────────────── */
#game-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: 0 2px 12px rgba(0,0,0,.06);
  touch-action: pan-y;
  position: relative;
  z-index: 2;
}
#game-card-stage {
  position: relative;
  overflow: hidden;
  border-radius: var(--radius);
}
.swipe-peek {
  position: absolute;
  top: 0;
  bottom: 0;
  width: 100%;
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: 0 2px 12px rgba(0,0,0,.08);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 14px;
  opacity: 0;
  pointer-events: none;
  z-index: 1;
}
.swipe-peek.prev { left: 0; }
.swipe-peek.next { left: 0; }
.swipe-peek-inner {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.swipe-peek-label {
  font-size: 0.58rem;
  font-weight: 700;
  letter-spacing: 1.1px;
  text-transform: uppercase;
  color: var(--sub);
}
.swipe-peek-title {
  font-family: 'Bebas Neue', cursive;
  font-size: 1.2rem;
  letter-spacing: 1.4px;
  line-height: 1;
  color: var(--text);
}
.swipe-peek-sub {
  font-size: 0.67rem;
  color: var(--sub);
  font-weight: 500;
}

/* ── GAME HEADER ──────────────────────────── */
.game-header {
  padding: 18px 22px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 7px;
  position: relative;
}
.gh-top {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
}
.pill {
  display: inline-flex;
  align-items: center;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 0.62rem;
  font-weight: 700;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  background: var(--accent-light);
  color: var(--accent);
}
.pill-live {
  background: #fef2f2;
  color: #dc2626;
  gap: 5px;
}
.live-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #dc2626;
  flex-shrink: 0;
  animation: live-pulse 1.2s ease-in-out infinite;
}
@keyframes live-pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: .25; }
}
.gh-meta {
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
  justify-content: center;
}
.meta-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 0.78rem;
  color: var(--sub);
}
.meta-item strong { color: var(--text); font-weight: 600; }

/* ── TEAMS ────────────────────────────────── */
.teams-section {
  padding: 26px 22px 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-bottom: 1px solid var(--border);
  background: var(--white);
}
.team-block {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}
.team-flag {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid var(--border);
  display: block;
  background: var(--bg);
  flex-shrink: 0;
}
.team-name {
  font-size: 0.95rem;
  font-weight: 800;
  text-align: center;
  letter-spacing: .5px;
  text-transform: uppercase;
  line-height: 1.15;
}
.team-count {
  font-size: 0.63rem;
  font-weight: 600;
  color: var(--light);
  letter-spacing: .5px;
  text-transform: uppercase;
}
.vs-center {
  flex-shrink: 0;
  padding: 0 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
}
.vs-text {
  font-family: 'Bebas Neue', cursive;
  font-size: 1.8rem;
  letter-spacing: 4px;
  color: var(--border);
  line-height: 1;
}
.score-live {
  display: flex;
  align-items: center;
  gap: 8px;
}
.score-live .s-num {
  font-family: 'Bebas Neue', cursive;
  font-size: 2.2rem;
  letter-spacing: 2px;
  line-height: 1;
  color: var(--text);
}
.score-live .s-num.goal-flash {
  animation: goalPop .7s ease-out forwards;
}
@keyframes goalPop {
  0%   { transform: scale(1);    color: var(--text); }
  20%  { transform: scale(1.55); color: #16a34a; }
  60%  { transform: scale(1.3);  color: #16a34a; }
  100% { transform: scale(1);    color: var(--text); }
}
.score-live .s-x {
  font-family: 'Bebas Neue', cursive;
  font-size: 1.4rem;
  letter-spacing: 3px;
  color: var(--border);
  line-height: 1;
}
.goal-events {
  width: min(420px, 72vw);
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px 14px;
  margin-top: 2px;
}
.goal-col {
  display: flex;
  flex-direction: column;
  gap: 4px;
  min-height: 18px;
}
.goal-event {
  display: flex;
  align-items: center;
  justify-content: flex-start;
  gap: 6px;
  min-width: 0;
  font-size: 0.67rem;
  line-height: 1.15;
  font-weight: 600;
}
.goal-col-a .goal-event {
  justify-content: flex-end;
  text-align: right;
}
.goal-col-b .goal-event {
  justify-content: flex-start;
  text-align: left;
}
.goal-event-a { color: var(--col-a); }
.goal-event-b { color: var(--col-b); }
.goal-minute {
  flex-shrink: 0;
  font-weight: 800;
}
.goal-player {
  max-width: 120px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.goal-tags {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  flex-wrap: wrap;
}
.goal-tag {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 20px;
  padding: 1px 5px;
  border-radius: 999px;
  background: rgba(15, 23, 42, 0.08);
  color: var(--text);
  font-size: 0.55rem;
  font-weight: 800;
  letter-spacing: .4px;
}
.goal-events-compact {
  display: none;
  width: min(340px, 88vw);
  margin-top: 4px;
}
.goal-events-compact .goal-event {
  justify-content: center;
  text-align: center;
  font-size: 0.65rem;
}
.goal-team {
  font-weight: 800;
  letter-spacing: .4px;
  text-transform: uppercase;
}
.goal-team-a { color: var(--col-a); }
.goal-team-b { color: var(--col-b); }
.game-avg-wrap {
  margin-top: 8px;
  display: flex;
  justify-content: center;
}
.game-avg-badge {
  min-width: 52px;
  min-height: 42px;
  padding: 4px 6px;
  border: 1px solid var(--border);
  border-radius: 8px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 1px;
  line-height: 1;
}
.game-avg-label {
  font-size: 0.48rem;
  font-weight: 800;
  letter-spacing: .8px;
  text-transform: uppercase;
}
.game-avg-value {
  font-family: 'Bebas Neue', cursive;
  font-size: 1.05rem;
  letter-spacing: 1px;
}
.emp-count {
  font-size: 0.63rem;
  color: var(--light);
  letter-spacing: .8px;
  text-transform: uppercase;
  font-weight: 600;
}

/* ── BETS COLUMNS ─────────────────────────── */
.bets-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
}
.bet-col {
  border-right: 1px solid var(--border);
}
.bet-col:last-child { border-right: none; }

.bet-col-head {
  padding: 11px 14px;
  border-bottom: 1px solid var(--border);
  text-align: center;
}
.bch-label {
  font-size: 0.58rem;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--light);
  display: block;
  margin-bottom: 2px;
}
.bch-team {
  font-size: 0.78rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .4px;
  display: block;
}
.bch-team-a   { color: var(--col-a); }
.bch-team-emp { color: var(--col-emp); }
.bch-team-b   { color: var(--col-b); }
.bch-count {
  font-size: 0.58rem;
  color: var(--light);
  font-weight: 500;
  display: block;
  margin-top: 2px;
}

/* ── BET ROWS ─────────────────────────────── */
.bet-list { list-style: none; }
.bet-item {
  display: flex;
  align-items: center;
  padding: 8px 13px;
  border-bottom: 1px solid var(--border);
  gap: 6px;
}
.bet-item:last-child { border-bottom: none; }
.bi-name {
  font-size: 0.77rem;
  font-weight: 500;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
  min-width: 0;
}
.bi-score {
  font-family: 'Bebas Neue', cursive;
  font-size: 0.92rem;
  letter-spacing: 1.5px;
  flex-shrink: 0;
}
.bi-score-a   { color: var(--col-a); }
.bi-score-emp { color: var(--col-emp); }
.bi-score-b   { color: var(--col-b); }

/* ── PTS BADGE ────────────────────────────── */
.bi-pts {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 22px; height: 20px; padding: 0 4px; border-radius: 4px;
  font-family: 'Bebas Neue', cursive; font-size: 0.75rem;
  flex-shrink: 0; margin-left: 2px;
}
.bi-pts.p-max  { background: #dcfce7; color: #166534; }
.bi-pts.p-some { background: #fef9c3; color: #854d0e; }
.bi-pts.p-zero { background: #fee2e2; color: #991b1b; }

/* ── HIT HIGHLIGHTS ─────────────────────── */
.bet-item.result-hit .bi-name { color: var(--accent); font-weight: 700; }
.bet-item.score-hit { background: #f0fdf4; }
.bet-item.score-hit .bi-name { color: var(--accent); font-weight: 700; }
.bet-col-head.win-col {
  background: #f0fdf4;
  border-bottom: 2px solid #86efac;
}
.bet-col-head.win-col .bch-label { color: var(--accent); }
.bi-hit-icon {
  color: #f59e0b;
  font-size: 0.82rem;
  flex-shrink: 0;
  line-height: 1;
}

.empty-bet {
  padding: 18px 12px;
  text-align: center;
  font-size: 0.68rem;
  color: var(--border);
  letter-spacing: 1px;
  text-transform: uppercase;
  font-weight: 600;
}

/* ── STATS BAR ────────────────────────────── */
.stats-bar {
  padding: 13px 22px;
  border-top: 1px solid var(--border);
  background: var(--bg);
  border-radius: 0 0 var(--radius) var(--radius);
}
.stats-track {
  height: 7px;
  border-radius: 4px;
  overflow: hidden;
  background: var(--border);
  display: flex;
  margin-bottom: 7px;
}
.seg-a   { background: var(--col-a);  transition: width .4s; }
.seg-emp { background: #d97706;       transition: width .4s; }
.seg-b   { background: var(--col-b);  transition: width .4s; }
.stats-labels {
  display: flex;
  justify-content: space-between;
  font-size: 0.65rem;
  font-weight: 600;
}
.sl-a   { color: var(--col-a); }
.sl-emp { color: #92400e; }
.sl-b   { color: var(--col-b); }

/* ── SEARCH BOX ──────────────────────────── */
.search-wrap {
  position: relative;
  flex: 1;
  min-width: 0;
}
.search-input {
  width: 100%;
  background: var(--white);
  border: 1.5px solid var(--border);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 0.78rem;
  padding: 6px 32px 6px 30px;
  border-radius: 7px;
  outline: none;
  transition: border-color .15s;
}
.search-input:focus { border-color: var(--accent); }
.search-icon {
  position: absolute;
  left: 9px;
  top: 50%;
  transform: translateY(-50%);
  pointer-events: none;
  color: var(--light);
}
.search-clear {
  position: absolute;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  cursor: pointer;
  color: var(--light);
  font-size: 1rem;
  line-height: 1;
  padding: 0;
  display: none;
}
.search-clear:hover { color: var(--text); }
.search-dropdown {
  position: absolute;
  top: calc(100% + 5px);
  left: 0;
  right: 0;
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: 9px;
  box-shadow: 0 8px 24px rgba(0,0,0,.12);
  max-height: 320px;
  overflow-y: auto;
  z-index: 200;
  display: none;
}
.search-dropdown.open { display: block; }
.sd-item {
  padding: 9px 13px;
  font-size: 0.78rem;
  cursor: pointer;
  border-bottom: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 1px;
}
.sd-item:last-child { border-bottom: none; }
.sd-item:hover, .sd-item.active { background: var(--accent-light); }
.sd-teams {
  font-weight: 700;
  color: var(--text);
}
.sd-teams mark {
  background: #fef08a;
  color: var(--text);
  border-radius: 2px;
  padding: 0 1px;
}
.sd-meta {
  font-size: 0.66rem;
  color: var(--sub);
  font-weight: 400;
}
.sd-empty {
  padding: 14px 13px;
  font-size: 0.75rem;
  color: var(--sub);
  text-align: center;
}

/* ── RESPONSIVE ───────────────────────────── */
@media (max-width: 720px) {
  .teams-section {
    padding: 22px 14px 18px;
    display: grid;
    grid-template-columns: minmax(94px, 1fr) minmax(148px, 1.2fr) minmax(94px, 1fr);
    align-items: start;
    gap: 8px;
  }
  .team-block { min-width: 94px; }
  .team-flag { width: 58px; height: 58px; }
  .team-name { font-size: .84rem; }
  .vs-center {
    min-width: 0;
    padding: 0 4px;
  }
  .score-live .s-num { font-size: 1.9rem; }
  .score-live .s-x { font-size: 1.2rem; letter-spacing: 2px; }
  .goal-events { display: none; }
  .goal-events-compact {
    display: block;
    width: min(300px, 62vw);
  }
}

@media (max-width: 520px) {
  .teams-section {
    padding: 18px 10px 16px;
    gap: 6px;
    display: grid;
    grid-template-columns: minmax(72px, 1fr) minmax(112px, 1.2fr) minmax(72px, 1fr);
    align-items: start;
  }
  .team-block {
    min-width: 72px;
  }
  .team-flag { width: 50px; height: 50px; }
  .team-name { font-size: .78rem; letter-spacing: .2px; }
  .vs-center {
    padding: 0 2px;
    min-width: 0;
  }
  .score-live { gap: 5px; }
  .score-live .s-num { font-size: 1.65rem; }
  .score-live .s-x { font-size: 1.05rem; letter-spacing: 1.6px; }
  .goal-events { display: none; }
  .goal-events-compact {
    display: block;
    width: min(240px, 58vw);
  }
  .goal-events-compact .goal-player { max-width: 92px; }
  .goal-event { font-size: 0.61rem; }
  .game-avg-badge { min-width: 48px; min-height: 40px; }
  .bet-item  { padding: 7px 9px; }
  .bi-name   { font-size: .7rem; }
  .bets-grid { grid-template-columns: 1fr; }
  .bet-col   { border-right: none; border-bottom: 1px solid var(--border); }
  .bet-col:last-child { border-bottom: none; }
  .content { padding: 16px 12px 64px; }
  .game-nav-bar { gap: 6px; }
  .gnb-controls { gap: 6px; }
  .nav-counter { display: none; }
  .stats-bar { overflow-x: auto; }
  .stats-labels { font-size: 0.6rem; gap: 4px; }
}

@media (max-width: 390px) {
  .teams-section {
    grid-template-columns: minmax(64px, 1fr) minmax(104px, 1.1fr) minmax(64px, 1fr);
    gap: 8px 2px;
  }
  .team-block { min-width: 64px; }
  .team-flag { width: 44px; height: 44px; }
  .team-name { font-size: .7rem; }
  .score-live .s-num { font-size: 1.45rem; }
  .score-live .s-x { font-size: .95rem; }
  .goal-events-compact {
    width: min(208px, 56vw);
  }
  .goal-events-compact .goal-player { max-width: 74px; }
}

</style>
</head>
<body>

<div id="site-header"></div>
<script>injectHeader('apostas','Apostas por jogo');</script>

<main class="content">
  <div id="loading-overlay">
    <div class="loading-spinner"></div>
    <div class="loading-text">Carregando dados...</div>
  </div>
  <div class="game-nav-bar">
    <div class="gnb-controls">
      <button class="nav-btn" id="btn-prev" onclick="navigate(-1)">&#9664; Anterior</button>
      <div class="search-wrap" id="search-wrap">
        <svg class="search-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input class="search-input" id="search-input" type="text" placeholder="Buscar jogo..." autocomplete="off">
        <button class="search-clear" id="search-clear" onclick="clearSearch()" tabindex="-1">&#x2715;</button>
        <div class="search-dropdown" id="search-dropdown"></div>
      </div>
      <span class="nav-counter" id="nav-counter"></span>
      <button class="nav-btn" id="btn-next" onclick="navigate(1)">Próximo &#9654;</button>
    </div>
  </div>
  <div id="game-card-stage">
    <div class="swipe-peek prev" id="game-peek-prev"></div>
    <div class="swipe-peek next" id="game-peek-next"></div>
    <div id="game-card"></div>
  </div>
</main>

<script src="bolao_utils.js"></script>
<script>
let JOGOS = [];
let currentIndex = 0;
let isSwipeAnimating = false;
const gameCardStage = document.getElementById('game-card-stage');
const gamePeekPrev = document.getElementById('game-peek-prev');
const gamePeekNext = document.getElementById('game-peek-next');

function calcBreakdown(betA, betB, realA, realB) {
  var gol = (betA === realA ? 1 : 0) + (betB === realB ? 1 : 0);
  var dif = (betA - betB) === (realA - realB) ? 1 : 0;
  var pts = gol + dif;
  var bR = betA > betB ? 'A' : betA < betB ? 'B' : 'E';
  var rR = realA > realB ? 'A' : realA < realB ? 'B' : 'E';
  var isRes = bR === rR ? 1 : 0;
  if (isRes) pts += (rR === 'E' ? 1 : 2);
  return { pts: pts };
}

function getMultiplier(j) {
  var g = (j.grupo || '').toUpperCase().trim();
  if (!g || /^[A-L]$/.test(g)) return 1;
  if (/^3/.test(g) || g === 'TER') return 4;
  if (g === 'FIN' || g === 'FINAL') return 10;
  return 1;
}

function formatDate(s) {
  if (!s) return '—';
  const d = new Date(s.replace(' ', 'T') + ':00');
  const h = String(d.getHours()).padStart(2, '0');
  const m = d.getMinutes();
  const mStr = m ? String(m).padStart(2, '0') : '';
  return WEEKDAY[d.getDay()] + ', ' + d.getDate() + ' de ' + MONTH_BR[d.getMonth()] + ' · ' + h + 'h' + mStr;
}

function pct(n, t) { return t === 0 ? 0 : Math.round(n / t * 100); }

function shortName(name) {
  if (!name) return '—';
  const p = name.trim().split(' ');
  if (p.length === 1) return name;
  const f = p[0], l = p[p.length - 1];
  return (f.length + l.length <= 17) ? (f + ' ' + l) : (f + ' ' + l[0] + '.');
}

function renderGoalEvents(j) {
  const goalsA = (j.golsDetalhesA || []).slice().sort(function(x, y) {
    return (x.minutoValor || 0) - (y.minutoValor || 0);
  });
  const goalsB = (j.golsDetalhesB || []).slice().sort(function(x, y) {
    return (x.minutoValor || 0) - (y.minutoValor || 0);
  });

  if (!goalsA.length && !goalsB.length) return '';

  function renderGoal(goal, side) {
    goal = goal || {};
    const tags = [];
    if (goal.penalti) tags.push('<span class="goal-tag">P</span>');
    if (goal.contra) tags.push('<span class="goal-tag">GC</span>');
    return '<div class="goal-event goal-event-' + side + '">' +
      '<span class="goal-minute">' + (goal.minuto || 'Gol') + '</span>' +
      '<span class="goal-player">' + shortName(goal.jogador || 'Gol') + '</span>' +
      (tags.length ? '<span class="goal-tags">' + tags.join('') + '</span>' : '') +
      '</div>';
  }

  const compactEvents = goalsA.map(function(goal) {
    return { goal: goal, side: 'a', minute: goal.minutoValor || 0 };
  }).concat(goalsB.map(function(goal) {
    return { goal: goal, side: 'b', minute: goal.minutoValor || 0 };
  })).sort(function(x, y) {
    return x.minute - y.minute;
  });

  const compactHtml = compactEvents.map(function(item) {
    const goal = item.goal || {};
    const tags = [];
    if (goal.penalti) tags.push('<span class="goal-tag">P</span>');
    if (goal.contra) tags.push('<span class="goal-tag">GC</span>');
    return '<div class="goal-event goal-event-' + item.side + '">' +
      '<span class="goal-minute">' + (goal.minuto || 'Gol') + '</span>' +
      '<span class="goal-team goal-team-' + item.side + '">' + (item.side === 'a' ? j.time_a.nome : j.time_b.nome) + '</span>' +
      '<span class="goal-player">' + shortName(goal.jogador || 'Gol') + '</span>' +
      (tags.length ? '<span class="goal-tags">' + tags.join('') + '</span>' : '') +
      '</div>';
  }).join('');

  return '<div class="goal-events">' +
    '<div class="goal-col goal-col-a">' + goalsA.map(function(goal) { return renderGoal(goal, 'a'); }).join('') + '</div>' +
    '<div class="goal-col goal-col-b">' + goalsB.map(function(goal) { return renderGoal(goal, 'b'); }).join('') + '</div>' +
    '</div>' +
    '<div class="goal-events-compact">' + compactHtml + '</div>';
}

function renderGameAverage(j) {
  const avg = bolaoGetAveragePoints(j);
  const color = bolaoGetAverageColor(avg);
  const value = avg === null ? '—' : avg.toFixed(1);
  return '<div class="game-avg-wrap">' +
    '<div class="game-avg-badge" style="background:' + color.bg + ';border-color:' + color.border + ';color:' + color.text + '">' +
      '<span class="game-avg-label">Média</span>' +
      '<span class="game-avg-value">' + value + '</span>' +
    '</div>' +
  '</div>';
}

function betItem(ap, type, hitResult, hitScore, rawPts, mult) {
  var cls = 'bet-item' + (hitScore ? ' score-hit' : hitResult ? ' result-hit' : '');
  var icon = hitScore ? '<span class="bi-hit-icon">★</span>' : '';
  var ptsBadge = '';
  if (rawPts !== undefined && rawPts !== null) {
    var dispPts = rawPts * (mult || 1);
    var ptsCls = rawPts === 0 ? 'p-zero' : rawPts <= 3 ? 'p-some' : 'p-max';
    ptsBadge = '<span class="bi-pts ' + ptsCls + '">' + (dispPts > 0 ? '+' + dispPts : '0') + '</span>';
  }
  return '<li class="' + cls + '">' + icon + '<span class="bi-name">' + shortName(ap.nome) +
    '</span><span class="bi-score bi-score-' + type + '">' + ap.placar + '</span>' + ptsBadge + '</li>';
}

function parsePlacar(placar) {
  var parts = (placar || '0x0').split('x');
  return { a: parseInt(parts[0]) || 0, b: parseInt(parts[1]) || 0 };
}

// Sort: 1) maior saldo de gols desc; 2) mais gols do vencedor desc; 3) alfabético
function sortBets(list, type) {
  return list.slice().sort(function(x, y) {
    var px = parsePlacar(x.placar), py = parsePlacar(y.placar);
    var sdx, sdy, vx, vy;
    if (type === 'a') {
      sdx = px.a - px.b; sdy = py.a - py.b;
      vx  = px.a;        vy  = py.a;
    } else if (type === 'b') {
      sdx = px.b - px.a; sdy = py.b - py.a;
      vx  = px.b;        vy  = py.b;
    } else { // empate
      sdx = px.a; sdy = py.a;
      vx  = px.a; vy  = py.a;
    }
    if (sdy !== sdx) return sdy - sdx;
    if (vy  !== vx)  return vy  - vx;
    return x.nome.localeCompare(y.nome, 'pt-BR', { sensitivity: 'base' });
  });
}

function flagImg(team, cls) {
  if (!team.logo) return '<div class="team-flag" style="display:flex;align-items:center;justify-content:center;font-size:1.6rem">🏴</div>';
  return '<img class="team-flag ' + cls + '" src="' + team.logo + '" alt="' + team.nome + '">';
}

function updatePageTitle(j) {
  if (j.gols_a !== null && j.gols_b !== null) {
    document.title = 'e-BÉTS - ' + j.time_a.nome + ' ' + j.gols_a + ' x ' + j.gols_b + ' ' + j.time_b.nome;

  }
}

function buildGameCardHtml(j) {

  const pA = pct(j.apostadores_a.length, total);
  const pE = pct(j.apostadores_empate.length, total);
  const pB = 100 - pA - pE;
  const goalEvents = renderGoalEvents(j);
  const avgBadge = renderGameAverage(j);

  const vsContent = (j.gols_a !== null && j.gols_b !== null)
    ? '<div class="score-live"><span class="s-num">' + j.gols_a + '</span><span class="s-x">×</span><span class="s-num">' + j.gols_b + '</span></div>' + goalEvents + avgBadge
    : '<div class="vs-text">×</div>';

  // Determine who got the result / exact score right
  var resultType = null;
  if (j.gols_a !== null && j.gols_b !== null) {
    if (j.gols_a > j.gols_b) resultType = 'a';
    else if (j.gols_a === j.gols_b) resultType = 'emp';
    else resultType = 'b';
  }
  var actualPlacar = resultType !== null ? j.gols_a + 'x' + j.gols_b : null;
  var mult = getMultiplier(j);

  function betPts(ap) {
    if (actualPlacar === null) return undefined;
    var sp = ap.placar.split('x');
    return calcBreakdown(+sp[0]||0, +sp[1]||0, j.gols_a, j.gols_b).pts;
  }

  const listA = j.apostadores_a.length
    ? '<ul class="bet-list">' + sortBets(j.apostadores_a, 'a').map(function(a) {
        return betItem(a, 'a', resultType === 'a', actualPlacar !== null && a.placar === actualPlacar, betPts(a), mult);
      }).join('') + '</ul>'
    : '<div class="empty-bet">—</div>';
  const listE = j.apostadores_empate.length
    ? '<ul class="bet-list">' + sortBets(j.apostadores_empate, 'emp').map(function(a) {
        return betItem(a, 'emp', resultType === 'emp', actualPlacar !== null && a.placar === actualPlacar, betPts(a), mult);
      }).join('') + '</ul>'
    : '<div class="empty-bet">—</div>';
  const listB = j.apostadores_b.length
    ? '<ul class="bet-list">' + sortBets(j.apostadores_b, 'b').map(function(a) {

  const groupPill = j.grupo ? '<span class="pill">Grupo ' + j.grupo + '</span>' : '';

  const localMeta = localStr

    : '';

  return '<div class="game-header">' +
      '<button class="btn-img" onclick="exportImage()" title="Salvar imagem" style="position:absolute;top:10px;right:12px">' +
        '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">' +
          '<path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>' +
          '<polyline points="7,10 12,15 17,10"/>' +
          '<line x1="12" y1="15" x2="12" y2="3"/>' +
        '</svg>' +
      '</button>' +
      '<div class="gh-top">' + livePill + groupPill + '</div>' +
      '<div class="gh-meta">' +
        '<span class="meta-item"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><strong>' + formatDate(j.data) + '</strong></span>' +
        localMeta +
      '</div>' +
    '</div>' +
    '<div class="teams-section">' +
      '<div class="team-block">' + flagImg(j.time_a, 'flag-a') + '<div class="team-name">' + j.time_a.nome + '</div></div>' +
      '<div class="vs-center">' + vsContent + '</div>' +
      '<div class="team-block">' + flagImg(j.time_b, 'flag-b') + '<div class="team-name">' + j.time_b.nome + '</div></div>' +
    '</div>' +
    '<div class="bets-grid">' +
      '<div class="bet-col"><div class="bet-col-head' + (resultType === 'a' ? ' win-col' : '') + '"><span class="bch-label">Apostam em</span><span class="bch-team bch-team-a">' + j.time_a.nome + '</span><span class="bch-count">' + j.apostadores_a.length + ' apostador' + (j.apostadores_a.length !== 1 ? 'es' : '') + '</span></div>' + listA + '</div>' +
      '<div class="bet-col"><div class="bet-col-head' + (resultType === 'emp' ? ' win-col' : '') + '"><span class="bch-label">Apostam em</span><span class="bch-team bch-team-emp">Empate</span><span class="bch-count">' + j.apostadores_empate.length + ' apostador' + (j.apostadores_empate.length !== 1 ? 'es' : '') + '</span></div>' + listE + '</div>' +
      '<div class="bet-col"><div class="bet-col-head' + (resultType === 'b' ? ' win-col' : '') + '"><span class="bch-label">Apostam em</span><span class="bch-team bch-team-b">' + j.time_b.nome + '</span><span class="bch-count">' + j.apostadores_b.length + ' apostador' + (j.apostadores_b.length !== 1 ? 'es' : '') + '</span></div>' + listB + '</div>' +
    '</div>' +
    '<div class="stats-bar">' +
      '<div class="stats-track"><div class="seg-a" style="width:' + pA + '%"></div><div class="seg-emp" style="width:' + pE + '%"></div><div class="seg-b" style="width:' + pB + '%"></div></div>' +
      '<div class="stats-labels"><span class="sl-a">' + j.time_a.nome + ' ' + pA + '%</span><span class="sl-emp">Empate ' + pE + '%</span><span class="sl-b">' + pB + '% ' + j.time_b.nome + '</span></div>' +
    '</div>';
}

function renderGame(idx) {
  const j = JOGOS[idx];
  updatePageTitle(j);
  document.getElementById('game-card').innerHTML = buildGameCardHtml(j);

  renderGamePeeks();
}

function renderGamePeeks() {
  if (!gamePeekPrev || !gamePeekNext || !JOGOS.length) return;
  var prev = currentIndex > 0 ? JOGOS[currentIndex - 1] : null;
  var next = currentIndex < JOGOS.length - 1 ? JOGOS[currentIndex + 1] : null;
  gamePeekPrev.innerHTML = prev ? buildGameCardHtml(prev) : '';
  gamePeekNext.innerHTML = next ? buildGameCardHtml(next) : '';
  clearGamePeeks();
}

function clearGamePeeks() {
  if (!gamePeekPrev || !gamePeekNext) return;
  var w = gameCardStage ? gameCardStage.offsetWidth : window.innerWidth;
  gamePeekPrev.style.opacity = '0';
  gamePeekNext.style.opacity = '0';
  gamePeekPrev.style.transform = 'translate3d(' + (-w) + 'px,0,0)';
  gamePeekNext.style.transform = 'translate3d(' + w + 'px,0,0)';
}

function setGamePeekDrag(dx) {
  if (!gamePeekPrev || !gamePeekNext) return;
  var w = gameCardStage ? gameCardStage.offsetWidth : window.innerWidth;
  var absX = Math.min(Math.abs(dx), w);
  var p = absX / Math.max(1, w);
  if (dx > 0 && currentIndex > 0) {
    gamePeekPrev.style.opacity = String(0.22 + p * 0.78);
    gamePeekPrev.style.transform = 'translate3d(' + (-w + absX) + 'px,0,0)';
    gamePeekNext.style.opacity = '0';
    gamePeekNext.style.transform = 'translate3d(' + w + 'px,0,0)';
  } else if (dx < 0 && currentIndex < JOGOS.length - 1) {
    gamePeekNext.style.opacity = String(0.22 + p * 0.78);
    gamePeekNext.style.transform = 'translate3d(' + (w - absX) + 'px,0,0)';
    gamePeekPrev.style.opacity = '0';
    gamePeekPrev.style.transform = 'translate3d(' + (-w) + 'px,0,0)';
  } else {
    clearGamePeeks();
  }
}

// ── Search helpers ────────────────────────
const searchInput    = document.getElementById('search-input');
const searchDropdown = document.getElementById('search-dropdown');
const searchClear    = document.getElementById('search-clear');
let activeDropdownIdx = -1;

function gameLabel(j) {
  const ds = j.data ? j.data.slice(5, 10).replace('-', '/') : '??/??';
  return j.time_a.nome + ' × ' + j.time_b.nome + '  ' + ds;
}

function highlight(text, q) {
  if (!q) return text;
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
  return text.replace(re, '<mark>$1</mark>');
}

function buildSelect() {
  // no-op – search replaces select
}

function openDropdown(q) {
  const term = (q || '').trim().toLowerCase();
  const matches = [];
  JOGOS.forEach(function(j, i) {
    const label = gameLabel(j);
    if (!term || label.toLowerCase().includes(term)) {
      matches.push({ i: i, j: j, label: label });
    }
  });

  if (matches.length === 0) {
    searchDropdown.innerHTML = '<div class="sd-empty">Nenhum jogo encontrado</div>';
  } else {
    searchDropdown.innerHTML = matches.map(function(m, pos) {
      let ds = '??/??';
      if (m.j.data) {
        const d = new Date(m.j.data.replace(' ', 'T') + ':00');
        ds = d.getDate() + ' de ' + MONTH_BR[d.getMonth()];
      }
      const teams = highlight(m.j.time_a.nome + ' × ' + m.j.time_b.nome, term);
      return '<div class="sd-item" data-idx="' + m.i + '" data-pos="' + pos + '">' +
        '<span class="sd-teams">' + teams + '</span>' +
        '<span class="sd-meta">' + ds + (m.j.grupo ? ' · Grupo ' + m.j.grupo : '') + (m.j.cidade ? ' · ' + m.j.cidade : '') + '</span>' +
        '</div>';
    }).join('');
  }

  activeDropdownIdx = -1;
  searchDropdown.classList.add('open');
}

function closeDropdown() {
  searchDropdown.classList.remove('open');
  activeDropdownIdx = -1;
}

function clearSearch() {
  searchInput.value = '';
  searchClear.style.display = 'none';
  closeDropdown();
  searchInput.focus();
}

searchInput.addEventListener('input', function() {
  const q = searchInput.value;
  searchClear.style.display = q ? 'block' : 'none';
  if (q.trim()) {
    openDropdown(q);
  } else {
    closeDropdown();
  }
});

searchInput.addEventListener('focus', function() {
  if (searchInput.value.trim()) openDropdown(searchInput.value);
});

searchInput.addEventListener('keydown', function(e) {
  const items = searchDropdown.querySelectorAll('.sd-item');
  if (!items.length) return;
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    activeDropdownIdx = Math.min(activeDropdownIdx + 1, items.length - 1);
    items.forEach(function(el, i) { el.classList.toggle('active', i === activeDropdownIdx); });
    items[activeDropdownIdx].scrollIntoView({ block: 'nearest' });
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    activeDropdownIdx = Math.max(activeDropdownIdx - 1, 0);
    items.forEach(function(el, i) { el.classList.toggle('active', i === activeDropdownIdx); });
    items[activeDropdownIdx].scrollIntoView({ block: 'nearest' });
  } else if (e.key === 'Enter') {
    if (activeDropdownIdx >= 0) {
      const el = items[activeDropdownIdx];
      selectFromDropdown(parseInt(el.dataset.idx), el.textContent.trim());
    } else if (items.length === 1) {
      selectFromDropdown(parseInt(items[0].dataset.idx), items[0].querySelector('.sd-teams').textContent.trim());
    }
  } else if (e.key === 'Escape') {
    closeDropdown();
  }
});

searchDropdown.addEventListener('mousedown', function(e) {
  const item = e.target.closest('.sd-item');
  if (!item) return;
  e.preventDefault();
  selectFromDropdown(parseInt(item.dataset.idx), item.querySelector('.sd-teams').textContent.trim());
});

document.addEventListener('click', function(e) {
  if (!document.getElementById('search-wrap').contains(e.target)) closeDropdown();
});

function selectFromDropdown(idx, labelText) {
  currentIndex = idx;
  // strip HTML tags from label
  searchInput.value = JOGOS[idx].time_a.nome + ' × ' + JOGOS[idx].time_b.nome;
  searchClear.style.display = 'block';
  closeDropdown();
  renderGame(currentIndex);
  updateNav();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function navigate(dir) {
  if (isSwipeAnimating) return;
  const n = currentIndex + dir;
  if (n < 0 || n >= JOGOS.length) return;
  currentIndex = n;
  renderGame(currentIndex);
  updateNav();
  clearGamePeeks();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function updateNav() {
  document.getElementById('btn-prev').disabled = (currentIndex === 0);
  document.getElementById('btn-next').disabled = (currentIndex === JOGOS.length - 1);
  document.getElementById('nav-counter').textContent = (currentIndex + 1) + ' / ' + JOGOS.length;
  const j = JOGOS[currentIndex];
  searchInput.value = j.time_a.nome + ' × ' + j.time_b.nome;
  searchClear.style.display = 'block';
}

function resetSwipeCard(card, animated) {
  if (!card) return;
  card.style.transition = animated ? 'transform .18s ease, opacity .18s ease' : 'none';
  card.style.transform = 'translate3d(0,0,0)';
  card.style.opacity = '1';
  clearGamePeeks();
}

function navigateWithSwipe(dir) {
  var card = document.getElementById('game-card');
  if (!card || isSwipeAnimating) return false;

  var n = currentIndex + dir;
  if (n < 0 || n >= JOGOS.length) {
    resetSwipeCard(card, true);
    return false;
  }

  isSwipeAnimating = true;
  var width = Math.max(card.offsetWidth || 0, window.innerWidth || 0, 320);
  var outX = dir > 0 ? -width : width;
  var inX = -outX;

  card.style.transition = 'transform .18s ease, opacity .18s ease';
  card.style.transform = 'translate3d(' + outX + 'px,0,0)';
  card.style.opacity = '.22';

  setTimeout(function() {
    currentIndex = n;
    renderGame(currentIndex);
    updateNav();
    window.scrollTo({ top: 0, behavior: 'smooth' });

    card.style.transition = 'none';
    card.style.transform = 'translate3d(' + inX + 'px,0,0)';
    card.style.opacity = '.22';
    void card.offsetWidth;

    card.style.transition = 'transform .22s ease, opacity .22s ease';
    card.style.transform = 'translate3d(0,0,0)';
    card.style.opacity = '1';

    setTimeout(function() {
      card.style.transition = '';
      isSwipeAnimating = false;
      clearGamePeeks();
    }, 240);
  }, 180);

  return true;
}

function bindSwipeNavigation() {
  if (document.body.dataset.swipeBoundApostas === '1') return;

  var startX = 0;
  var startY = 0;
  var dragX = 0;
  var tracking = false;
  var dragging = false;

  function isInteractiveTarget(target) {
    return !!(target && target.closest('input, textarea, select, button, a, [contenteditable="true"], .search-dropdown'));
  }

  document.addEventListener('touchstart', function(e) {
    if (isSwipeAnimating || !e.touches || e.touches.length !== 1) return;
    var target = e.target;
    if ((target && target.closest('#site-header')) || isInteractiveTarget(target)) return;

    var t = e.touches[0];
    tracking = true;
    dragging = false;
    dragX = 0;
    startX = t.clientX;
    startY = t.clientY;
  }, { passive: true });

  document.addEventListener('touchmove', function(e) {
    if (!tracking || !e.touches || e.touches.length !== 1 || isSwipeAnimating) return;
    var card = document.getElementById('game-card');
    if (!card) return;

    var t = e.touches[0];
    var dx = t.clientX - startX;
    var dy = t.clientY - startY;
    var absX = Math.abs(dx);
    var absY = Math.abs(dy);

    if (!dragging) {
      if (absX < 10 && absY < 10) return;
      if (absY > absX * 1.12) {
        tracking = false;
        resetSwipeCard(card, false);
        return;
      }
      dragging = true;
    }

    if (e.cancelable) e.preventDefault();

    var blockedEdge = (currentIndex === 0 && dx > 0) || (currentIndex === JOGOS.length - 1 && dx < 0);
    dragX = blockedEdge ? dx * 0.35 : dx;

    card.style.transition = 'none';
    card.style.transform = 'translate3d(' + dragX + 'px,0,0)';
    card.style.opacity = String(Math.max(0.6, 1 - Math.abs(dragX) / 520));
    setGamePeekDrag(dragX);
  }, { passive: false });

  document.addEventListener('touchend', function() {
    if (!tracking || isSwipeAnimating) return;
    var card = document.getElementById('game-card');
    tracking = false;
    if (!card) return;

    if (!dragging) {
      resetSwipeCard(card, false);
      return;
    }

    dragging = false;
    var threshold = Math.max(70, Math.min(120, Math.round((card.offsetWidth || window.innerWidth || 360) * 0.18)));
    if (Math.abs(dragX) >= threshold) {
      var dir = dragX < 0 ? 1 : -1;
      if (!navigateWithSwipe(dir)) resetSwipeCard(card, true);
    } else {
      resetSwipeCard(card, true);
    }
    dragX = 0;
  }, { passive: true });

  document.addEventListener('touchcancel', function() {
    var card = document.getElementById('game-card');
    tracking = false;
    dragging = false;
    dragX = 0;
    resetSwipeCard(card, true);
  }, { passive: true });

  document.body.dataset.swipeBoundApostas = '1';
}

function imgToDataURL(img) {
  return new Promise(function(resolve) {
    if (!img.src || img.src.startsWith('data:')) { resolve(); return; }
    const original = img.src;
    // Render as a square canvas mimicking object-fit: cover
    const size = 140; // 70px * scale:2
    const canvas = document.createElement('canvas');
    canvas.width = size;
    canvas.height = size;
    const ctx = canvas.getContext('2d');
    const ci = new Image();
    ci.crossOrigin = 'anonymous';
    ci.onload = function() {
      const iw = ci.naturalWidth  || ci.width;
      const ih = ci.naturalHeight || ci.height;
      // object-fit: cover — scale so shorter side fills, then center-crop
      const scale = Math.max(size / iw, size / ih);
      const sw = iw * scale;
      const sh = ih * scale;
      const sx = (size - sw) / 2;
      const sy = (size - sh) / 2;
      try {
        ctx.drawImage(ci, sx, sy, sw, sh);
        img.src = canvas.toDataURL('image/png');
      } catch(e) {
        img.style.visibility = 'hidden';
      }
      resolve();
    };
    ci.onerror = function() { img.style.visibility = 'hidden'; resolve(); };
    ci.src = original + (original.includes('?') ? '&' : '?') + '_cb=' + Date.now();
  });
}

function exportImage() {
  const card = document.getElementById('game-card');
  const j = JOGOS[currentIndex];
  const fname = 'bolao_jogo' + j.id + '_' + j.time_a.nome.replace(/ /g, '-') + '_x_' + j.time_b.nome.replace(/ /g, '-') + '.png';

  // Convert all flag images to inline data URLs first
  const imgs = Array.from(card.querySelectorAll('img.team-flag'));
  const origSrcs = imgs.map(function(img) { return img.src; });

  Promise.all(imgs.map(imgToDataURL)).then(function() {
    html2canvas(card, {
      scale: 2,
      useCORS: false,
      allowTaint: false,
      backgroundColor: '#ffffff',
      logging: false
    }).then(function(canvas) {
      // Restore original src values
      imgs.forEach(function(img, i) {
        img.src = origSrcs[i];
        img.style.visibility = '';
      });
      const a = document.createElement('a');
      a.download = fname;
      a.href = canvas.toDataURL('image/png');
      a.click();
    });
  });
}

(async function init() {
  try {
    JOGOS = await buildJogos();
  } catch(e) {
    document.getElementById('loading-overlay').innerHTML = '<div class="loading-text">Erro ao carregar dados. Tente recarregar a página.</div>';
    return;
  }
  // Navega para jogo ao vivo; se não houver, para o próximo jogo
  // ?jogo=N param (from ranking sidebar link) overrides auto-navigation
  let startIdx = 0;
  const qjogo = new URLSearchParams(window.location.search).get('jogo');
  const qjogoN = qjogo !== null ? parseInt(qjogo, 10) : -1;
  if (qjogoN >= 0 && qjogoN < JOGOS.length) {
    startIdx = qjogoN;
  } else {
    const liveIdx = JOGOS.findIndex(function(j) { return j.isLive; });
    if (liveIdx >= 0) {
      startIdx = liveIdx;
    } else {
      const now = new Date();
      const nextIdx = JOGOS.findIndex(function(j) {
        return j.status === 'A' && j.data && new Date(j.data.replace(' ', 'T')) > now;
      });
      if (nextIdx >= 0) startIdx = nextIdx;
    }
  }
  currentIndex = startIdx;
  document.getElementById('loading-overlay').style.display = 'none';
  buildSelect();
  renderGame(currentIndex);
  updateNav();
  bindSwipeNavigation();

  // ── Auto-refresh every 40 s ──────────────────────────────────────────────
  setInterval(async function() {
    var fresh;
    try { fresh = await buildJogos(); } catch(e) { return; }

    // Compare only the data that can change (scores, status, bets)
    function snapshot(list) {
      return JSON.stringify(list.map(function(j) {
        return [
          j.id, j.gols_a, j.gols_b, j.status, j.isLive, j.liveClock,
          JSON.stringify(j.golsDetalhesA || []),
          JSON.stringify(j.golsDetalhesB || []),
          j.apostadores_a.length, j.apostadores_empate.length, j.apostadores_b.length,
          j.apostadores_a.map(function(a){return a.nome+a.placar;}).join(','),
          j.apostadores_empate.map(function(a){return a.nome+a.placar;}).join(','),
          j.apostadores_b.map(function(a){return a.nome+a.placar;}).join(',')
        ];
      }));
    }

    if (snapshot(fresh) === snapshot(JOGOS)) return; // nothing changed

    // Detect goals in the current game before swapping JOGOS
    var currentId = JOGOS[currentIndex] ? JOGOS[currentIndex].id : null;
    var prevGame = currentId !== null ? JOGOS.find(function(j){ return j.id === currentId; }) : null;
    var freshGame = currentId !== null ? fresh.find(function(j){ return j.id === currentId; }) : null;
    var goalA = prevGame && freshGame && freshGame.gols_a !== null && prevGame.gols_a !== null && freshGame.gols_a > prevGame.gols_a;
    var goalB = prevGame && freshGame && freshGame.gols_b !== null && prevGame.gols_b !== null && freshGame.gols_b > prevGame.gols_b;

    JOGOS = fresh;
    var newIdx = currentId !== null ? JOGOS.findIndex(function(j){ return j.id === currentId; }) : -1;
    if (newIdx < 0) newIdx = Math.min(currentIndex, JOGOS.length - 1);
    currentIndex = newIdx;

    renderGame(currentIndex);
    updateNav();

    // Flash score digits if a goal was scored
    if (goalA || goalB) {
      var nums = document.querySelectorAll('.score-live .s-num');
      if (nums.length === 2) {
        if (goalA) { nums[0].classList.remove('goal-flash'); void nums[0].offsetWidth; nums[0].classList.add('goal-flash'); }
        if (goalB) { nums[1].classList.remove('goal-flash'); void nums[1].offsetWidth; nums[1].classList.add('goal-flash'); }
      }
    }
  }, 15000);
})();

// ── Goal flash helper (exposed for testing) ──────────────────────────────────
function testGoalFlash(side) {
  var nums = document.querySelectorAll('.score-live .s-num');
  if (nums.length < 2) return;
  var targets = side === 'a' ? [nums[0]] : side === 'b' ? [nums[1]] : [nums[0], nums[1]];
  targets.forEach(function(el) {
    el.classList.remove('goal-flash');
    void el.offsetWidth; // force reflow to restart animation
    el.classList.add('goal-flash');
  });
}
window.testGoalFlash = testGoalFlash;
</script>
