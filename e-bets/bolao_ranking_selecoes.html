<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ranking de Seleções – Bolão Copa 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;800&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f0f2f5;
  --white: #ffffff;
  --border: #e0e3ea;
  --text: #111827;
  --sub: #6b7280;
  --light: #adb5c0;
  --accent: #166534;
  --accent-light: #dcfce7;
  --radius: 14px;
  --pos-green: #166534;
  --pos-green-bg: #dcfce7;
  --pos-red: #991b1b;
  --pos-red-bg: #fee2e2;
  --sg-pos: #166534;
  --sg-neg: #991b1b;
}

html, body {
  min-height: 100vh;
  background: var(--bg);
  font-family: 'Inter', sans-serif;
  color: var(--text);
}

/* ── PAGE HEADER ─────────────────────────── */
.page-header {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  padding: 12px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  flex-wrap: wrap;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 1px 4px rgba(0,0,0,.06);
}
.logo-title h1 {
  font-family: 'Bebas Neue', cursive;
  font-size: 1.35rem;
  letter-spacing: 3px;
  color: var(--accent);
}
.logo-title p {
  font-size: 0.62rem;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--sub);
  margin-top: 1px;
}
.header-nav {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.nav-btn {
  background: var(--white);
  border: 1.5px solid var(--border);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 0.78rem;
  font-weight: 600;
  padding: 6px 13px;
  border-radius: 7px;
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 5px;
}
.nav-btn:hover {
  background: var(--accent);
  border-color: var(--accent);
  color: white;
}
.btn-img {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--accent);
  border: none;
  color: white;
  font-family: 'Inter', sans-serif;
  font-size: 0.78rem;
  font-weight: 600;
  padding: 6px 14px;
  border-radius: 7px;
  cursor: pointer;
  transition: opacity .15s;
  white-space: nowrap;
}
.btn-img:hover { opacity: .85; }

/* ── MAIN LAYOUT ───────────────────────────── */
.main-layout {
  display: flex;
  align-items: flex-start;
  min-height: calc(100vh - 56px);
}
/* Right sidebar — sticky, full-height */
.sidebar {
  width: 210px;
  flex-shrink: 0;
  position: sticky;
  top: 56px;
  height: calc(100vh - 56px);
  overflow-y: auto;
  background: var(--white);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  order: 2;
}
.sidebar-section {
  border-bottom: 1px solid var(--border);
  display: flex;
  flex-direction: column;
}
.sidebar-section-head {
  padding: 10px 14px 8px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: #fafafa;
  flex-shrink: 0;
}
.sidebar-section-title {
  font-family: 'Bebas Neue', cursive;
  font-size: 0.88rem;
  letter-spacing: 2px;
  color: var(--text);
}
.sidebar-count {
  font-size: 0.6rem;
  color: var(--sub);
  font-weight: 600;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 1px 6px;
}
.sidebar-actions {
  padding: 5px 10px;
  display: flex;
  gap: 5px;
  flex-shrink: 0;
}
.sidebar-btn {
  flex: 1;
  font-family: 'Inter', sans-serif;
  font-size: 0.65rem;
  font-weight: 600;
  padding: 3px 4px;
  border-radius: 5px;
  border: 1.5px solid var(--border);
  background: var(--white);
  color: var(--sub);
  cursor: pointer;
  transition: all .12s;
}
.sidebar-btn:hover {
  background: var(--accent);
  border-color: var(--accent);
  color: white;
}
.sidebar-list {
  padding: 3px 0 6px;
  overflow-y: auto;
  flex: 1;
}
/* group tabs in sidebar — vertical list */
.sidebar-tabs {
  padding: 5px 6px;
  display: flex;
  flex-direction: column;
  gap: 2px;
  overflow-y: auto;
}
.gtab {
  font-family: 'Inter', sans-serif;
  font-size: 0.71rem;
  font-weight: 600;
  padding: 6px 10px;
  border-radius: 6px;
  border: 1.5px solid transparent;
  background: transparent;
  color: var(--sub);
  cursor: pointer;
  transition: all .12s;
  text-align: left;
  width: 100%;
}
.gtab:hover { background: var(--bg); color: var(--text); }
.gtab.active {
  background: var(--accent-light);
  color: var(--accent);
  font-weight: 700;
  border-color: #bbf7d0;
}
.p-check {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 3px 12px;
  font-size: 0.7rem;
  color: var(--text);
  cursor: pointer;
  user-select: none;
  line-height: 1.6;
}
.p-check:hover { background: var(--bg); }
.p-check input { cursor: pointer; accent-color: var(--accent); flex-shrink: 0; }
/* Content area — centered in remaining space */
.main-content {
  flex: 1;
  min-width: 0;
  padding: 24px 20px 72px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  max-width: 860px;
  margin: 0 auto;
  order: 1;
}
/* hide old horizontal tabs card */
.group-tabs-card { display: none; }

/* ── CARD ─────────────────────────────────── */
.card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: 0 2px 12px rgba(0,0,0,.05);
}
.card-head {
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  flex-wrap: wrap;
  background: #fafafa;
}
.card-head-title {
  font-family: 'Bebas Neue', cursive;
  font-size: 1.15rem;
  letter-spacing: 2.5px;
  color: var(--text);
}
.card-head-sub {
  font-size: 0.65rem;
  color: var(--sub);
  font-weight: 500;
}

/* ── STANDINGS TABLE ──────────────────────── */
.stand-wrap {
  overflow-x: auto;
}
.stand-table {
  width: 100%;
  border-collapse: collapse;
  min-width: 560px;
}
.stand-table th {
  padding: 8px 10px;
  font-size: 0.58rem;
  font-weight: 700;
  letter-spacing: 1.1px;
  text-transform: uppercase;
  color: var(--sub);
  text-align: right;
  border-bottom: 1px solid var(--border);
  background: #f5f6f8;
  white-space: nowrap;
}
.stand-table th.left { text-align: left; }
.stand-table th.center { text-align: center; }

.stand-table td {
  padding: 9px 10px;
  border-bottom: 1px solid var(--border);
  font-size: 0.8rem;
  vertical-align: middle;
  text-align: right;
  white-space: nowrap;
}
.stand-table tr:last-child td { border-bottom: none; }
.stand-table tr:hover td { background: #f9fafb; }

.td-pos {
  font-family: 'Bebas Neue', cursive;
  font-size: 1rem;
  color: var(--light);
  text-align: center;
  width: 28px;
}

.td-team {
  text-align: left;
  min-width: 150px;
}
.team-cell {
  display: flex;
  align-items: center;
  gap: 9px;
}
.team-flag {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  object-fit: cover;
  border: 1px solid var(--border);
  flex-shrink: 0;
  background: var(--bg);
}
.team-name {
  font-weight: 600;
  font-size: 0.82rem;
  color: var(--text);
}
.team-group-badge {
  font-size: 0.55rem;
  font-weight: 700;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  padding: 1px 5px;
  border-radius: 4px;
  background: var(--bg);
  color: var(--sub);
  border: 1px solid var(--border);
  flex-shrink: 0;
}

.td-pts {
  font-family: 'Bebas Neue', cursive;
  font-size: 1.25rem;
  letter-spacing: 1px;
  color: var(--text);
}
.td-num {
  color: var(--sub);
  font-size: 0.78rem;
  font-weight: 500;
}
.td-sg-pos {
  font-weight: 700;
  color: var(--sg-pos);
}
.td-sg-neg {
  font-weight: 700;
  color: var(--sg-neg);
}
.td-sg-zero {
  color: var(--sub);
  font-weight: 500;
}

/* colored rank stripe on left — group view */
.stand-table tr.rank-q td:first-child { border-left: 3px solid #1d4ed8; }
.stand-table tr.rank-q td { background: #eff6ff; }
.stand-table tr.rank-q:hover td { background: #dbeafe; }
.stand-table tr.rank-3rd td:first-child { border-left: 3px solid #d97706; }
.stand-table tr.rank-3rd td { background: #fffbeb; }
.stand-table tr.rank-3rd:hover td { background: #fef3c7; }
/* top-8 terceiros highlight */
.stand-table tr.rank-top8 td:first-child { border-left: 3px solid #1d4ed8; }
.stand-table tr.rank-top8 td { background: #eff6ff; }
.stand-table tr.rank-top8:hover td { background: #dbeafe; }

/* ── TODOS GAP ─────────────────────────────── */
.todos-groups-wrap {
  display: flex;
  flex-direction: column;
  gap: 28px;
}

/* ── INFO STRIP ────────────────────────────── */
.info-strip {
  padding: 9px 18px;
  font-size: 0.72rem;
  color: var(--sub);
  border-bottom: 1px solid var(--border);
  background: #fcfcfd;
  line-height: 1.6;
}

/* ── RESPONSIVE ────────────────────────────── */
@media (max-width: 700px) {
  .sidebar { display: none; }
  .main-content { padding: 12px 10px 60px; max-width: 100%; }
  .team-group-badge { display: none; }
  .stand-table { min-width: 440px; }
}
</style>
</head>

  <div class="main-content">

</main>

// ── Helpers ───────────────────────────────────────────────────────────────────
function fmt1(v) { return v.toFixed(1); }
function fmt2(v) { return v.toFixed(2); }
function fmtSG(v) {
  var s = v.toFixed(2);
  if (v > 0.005) return '+' + s;
  if (v < -0.005) return s;
  return '0.00';
}

// ── Collect participants and groups from raw data ─────────────────────────────
var allParticipants = (function() {
  var seen = {}, list = [];
  JOGOS.forEach(function(j) {
    [].concat(j.apostadores_a, j.apostadores_empate, j.apostadores_b).forEach(function(a) {
      if (!seen[a.nome]) { seen[a.nome] = true; list.push(a.nome); }
    });
  });
  return list.sort(function(a, b) { return a.localeCompare(b, 'pt-BR', { sensitivity: 'base' }); });
})();

var groups = (function() {
  var seen = {}, list = [];
  JOGOS.forEach(function(j) { if (!seen[j.grupo]) { seen[j.grupo] = true; list.push(j.grupo); } });
  return list.sort();
})();

// ── State ─────────────────────────────────────────────────────────────────────
var activeView = 'total'; // 'total', 'todos', or a group letter
var selectedParticipants = new Set(allParticipants);
var allTeams = [];

// ── Compute team stats from filtered apostas ──────────────────────────────────
function computeAllTeams() {
  var teamsMap = {};
  function getOrCreate(id, nome, logo, grupo) {
    if (!teamsMap[id]) teamsMap[id] = { id: id, nome: nome, logo: logo, grupo: grupo,
      jogos: 0, expV: 0, expE: 0, expD: 0, expGF: 0, expGC: 0 };
    return teamsMap[id];
  }
  JOGOS.forEach(function(j) {
    var fA = j.apostadores_a.filter(function(a) { return selectedParticipants.has(a.nome); });
    var fE = j.apostadores_empate.filter(function(a) { return selectedParticipants.has(a.nome); });
    var fB = j.apostadores_b.filter(function(a) { return selectedParticipants.has(a.nome); });
    var nA = fA.length, nE = fE.length, nB = fB.length;
    var total = nA + nE + nB;
    if (total === 0) return;
    var allApostas = fA.concat(fE, fB);
    var sumGA = 0, sumGB = 0;
    allApostas.forEach(function(a) {
      var parts = (a.placar || '0x0').split('x');
      sumGA += (parseInt(parts[0]) || 0);
      sumGB += (parseInt(parts[1]) || 0);
    });
    var avgGA = sumGA / total, avgGB = sumGB / total;
    var tA = getOrCreate(j.time_a.id, j.time_a.nome, j.time_a.logo, j.grupo);
    tA.jogos++; tA.expV += nA/total; tA.expE += nE/total; tA.expD += nB/total;
    tA.expGF += avgGA; tA.expGC += avgGB;
    var tB = getOrCreate(j.time_b.id, j.time_b.nome, j.time_b.logo, j.grupo);
    tB.jogos++; tB.expV += nB/total; tB.expE += nE/total; tB.expD += nA/total;
    tB.expGF += avgGB; tB.expGC += avgGA;
  });
  allTeams = Object.values(teamsMap).map(function(t) {
    return Object.assign({}, t, { pts: t.expV*3 + t.expE, sg: t.expGF - t.expGC });
  });
}

// ── Sort function: pts desc → sg desc → gf desc → alphabetical ──────────────
function sortTeams(arr) {
  return arr.slice().sort(function(a, b) {
    var dp = b.pts - a.pts;
    if (Math.abs(dp) > 0.0001) return dp;
    var ds = b.sg - a.sg;
    if (Math.abs(ds) > 0.0001) return ds;
    var dg = b.expGF - a.expGF;
    if (Math.abs(dg) > 0.0001) return dg;
    return a.nome.localeCompare(b.nome, 'pt-BR', { sensitivity: 'base' });
  });
}

// ── Render tabs ───────────────────────────────────────────────────────────────
function renderTabs() {
  var tabsEl = document.getElementById('group-tabs');
  var html = '<button class="gtab' + (activeView === 'total' ? ' active' : '') +
             '" onclick="switchView(\'total\')">Geral</button>';
  html += '<button class="gtab' + (activeView === 'todos' ? ' active' : '') +
          '" onclick="switchView(\'todos\')">Todos os grupos</button>';
  groups.forEach(function(g) {
    html += '<button class="gtab' + (activeView === g ? ' active' : '') +
            '" onclick="switchView(\'' + g + '\')">Grupo ' + g + '</button>';
  });
  tabsEl.innerHTML = html;
}

// ── Build standings row HTML ──────────────────────────────────────────────────
function rowHtml(t, pos, showGroup, rankClass) {
  if (rankClass === undefined) rankClass = '';
  var sgClass = t.sg > 0.005 ? 'td-sg-pos' : t.sg < -0.005 ? 'td-sg-neg' : 'td-sg-zero';
  var flagHtml = t.logo
    ? '<img class="team-flag" src="' + t.logo + '" alt="' + t.nome + '" loading="lazy">'
    : '<div class="team-flag" style="background:var(--border)"></div>';
  var groupBadge = showGroup
    ? '<span class="team-group-badge">Grp ' + (t._grupo || t.grupo) + '</span>'
    : '';

  return '<tr class="' + rankClass + '">' +
    '<td class="td-pos">' + pos + '</td>' +
    '<td class="td-team">' +
      '<div class="team-cell">' +
        flagHtml +
        '<span class="team-name">' + t.nome + '</span>' +
        groupBadge +
      '</div>' +
    '</td>' +
    '<td class="td-num">' + t.jogos + '</td>' +
    '<td class="td-num">' + fmt2(t.expV) + '</td>' +
    '<td class="td-num">' + fmt2(t.expE) + '</td>' +
    '<td class="td-num">' + fmt2(t.expD) + '</td>' +
    '<td class="td-num">' + fmt2(t.expGF) + '</td>' +
    '<td class="td-num">' + fmt2(t.expGC) + '</td>' +
    '<td class="' + sgClass + '">' + fmtSG(t.sg) + '</td>' +
    '<td class="td-pts">' + fmt2(t.pts) + '</td>' +
  '</tr>';
}

// ── Build a standings table card ──────────────────────────────────────────────
// showInfo: show the info strip; showSubtitle: show subtitle in card-head
// mode: 'group' (highlight top-2 blue, 3rd amber), 'terceiros' (highlight top-8 blue), 'geral' (no highlight)
function tableCardHtml(title, subtitle, teamsArr, showGroup, showInfo, showSubtitle, mode) {
  if (showInfo === undefined) showInfo = true;
  if (showSubtitle === undefined) showSubtitle = true;
  if (mode === undefined) mode = 'geral';
  var sorted = sortTeams(teamsArr);
  var rows = sorted.map(function(t, i) {
    var pos = i + 1;
    var rc = '';
    if (mode === 'group') {
      if (pos <= 2) rc = 'rank-q';
      else if (pos === 3) rc = 'rank-3rd';
    } else if (mode === 'terceiros') {
      if (pos <= 8) rc = 'rank-top8';
    }
    return rowHtml(t, pos, showGroup, rc);
  }).join('');

  return '<div class="card">' +
    '<div class="card-head">' +
      '<span class="card-head-title">' + title + '</span>' +
      (showSubtitle && subtitle ? '<span class="card-head-sub">' + subtitle + '</span>' : '') +
    '</div>' +
    (showInfo ? '<div class="info-strip">' +
      '<strong style="color:var(--text)">Valores esperados</strong> calculados a partir das apostas: ' +
      'pontos = vitórias × 3 + empates; saldo = gols pró − gols contra. ' +
      'Critérios de desempate: Pontos → Saldo de gols → Gols pró.' +
    '</div>' : '') +
    '<div class="stand-wrap">' +
      '<table class="stand-table">' +
        '<thead><tr>' +
          '<th class="center">#</th>' +
          '<th class="left">Seleção</th>' +
          '<th title="Jogos">J</th>' +
          '<th title="Vitórias esperadas">V</th>' +
          '<th title="Empates esperados">E</th>' +
          '<th title="Derrotas esperadas">D</th>' +
          '<th title="Gols pró esperados">GP</th>' +
          '<th title="Gols contra esperados">GC</th>' +
          '<th title="Saldo de gols esperado">SG</th>' +
          '<th title="Pontos esperados">Pts</th>' +
        '</tr></thead>' +
        '<tbody>' + rows + '</tbody>' +
      '</table>' +
    '</div>' +
  '</div>';
}

// ── Render content area ───────────────────────────────────────────────────────
function renderContent() {
  var container = document.getElementById('tables-container');
  var html = '';

  if (activeView === 'total') {
    html = tableCardHtml('Classificação Geral', 'Todas as seleções · ' + allTeams.length + ' equipes', allTeams, true);
  } else if (activeView === 'todos') {
    // One compact card per group (no info strip, no subtitle)
    var groupCards = groups.map(function(g) {
      var groupTeams = allTeams.filter(function(t) { return t.grupo === g; });
      return tableCardHtml('Grupo ' + g, '', groupTeams, false, false, false, 'group');
    }).join('');
    // Best 3rd-place teams card
    var terceiros = groups.map(function(g) {
      var groupTeams = sortTeams(allTeams.filter(function(t) { return t.grupo === g; }));
      return groupTeams[2] ? Object.assign({}, groupTeams[2], { _grupo: g }) : null;
    }).filter(Boolean);
    var terceirosCard = tableCardHtml(
      'Melhores 3º Colocados',
      'Top 8 avançam — critério: Pontos → Saldo de gols → Gols pró',
      terceiros, true, false, true, 'terceiros'
    );
    html = '<div class="todos-groups-wrap">' + groupCards + terceirosCard + '</div>';
  } else {
    var groupTeams = allTeams.filter(function(t) { return t.grupo === activeView; });
    html = tableCardHtml('Grupo ' + activeView, '', groupTeams, false, true, false, 'group');
  }

  container.innerHTML = html;
}

// ── Switch view ───────────────────────────────────────────────────────────────
function switchView(view) {
  activeView = view;
  renderTabs();
  renderContent();
}

// ── Sidebar ─────────────────────────────────────────────────────────────
function renderSidebar() {
  var html = allParticipants.map(function(p) {
    var chk = selectedParticipants.has(p) ? ' checked' : '';
    return '<label class="p-check"><input type="checkbox" value="' +
      p.replace(/"/g, '&quot;') + '"' + chk + ' onchange="toggleParticipant(this)"> ' + p + '</label>';
  }).join('');
  document.getElementById('participant-list').innerHTML = html;
  document.getElementById('sidebar-count').textContent = selectedParticipants.size + ' / ' + allParticipants.length;
}

function toggleParticipant(cb) {
  if (cb.checked) selectedParticipants.add(cb.value);
  else selectedParticipants.delete(cb.value);
  document.getElementById('sidebar-count').textContent = selectedParticipants.size + ' / ' + allParticipants.length;
  computeAllTeams();
  renderContent();
}

function selectAll() {
  selectedParticipants = new Set(allParticipants);
  renderSidebar(); computeAllTeams(); renderContent();
}

function selectNone() {
  selectedParticipants = new Set();
  renderSidebar(); computeAllTeams(); renderContent();
}

// ── Init ──────────────────────────────────────────────────────────────
computeAllTeams();
renderSidebar();
renderTabs();
renderContent();

// ── Image export ───────────────────────────────────────────────────────────────
function imgToDataURL(img) {
  return new Promise(function(resolve) {
    if (!img.src || img.src.startsWith('data:')) { resolve(); return; }
    var original = img.src;
    var size = 48; // 24px * scale:2
    var canvas = document.createElement('canvas');
    canvas.width = size;
    canvas.height = size;
    var ctx = canvas.getContext('2d');
    var ci = new Image();
    ci.crossOrigin = 'anonymous';
    ci.onload = function() {
      var iw = ci.naturalWidth  || ci.width;
      var ih = ci.naturalHeight || ci.height;
      var scale = Math.max(size / iw, size / ih);
      var sw = iw * scale;
      var sh = ih * scale;
      var sx = (size - sw) / 2;
      var sy = (size - sh) / 2;
      try {
        ctx.drawImage(ci, sx, sy, sw, sh);
        img.src = canvas.toDataURL('image/png');
      } catch(e) {
        img.style.visibility = 'hidden';
      }
      resolve();
    };
    ci.onerror = function() { img.style.visibility = 'hidden'; resolve(); };
    ci.src = original + (original.includes('?') ? '&' : '?') + '_cb=' + Date.now();
  });
}

function exportImage() {
  var container = document.getElementById('tables-container');
  var groupLabel = activeView === 'total' ? 'geral' : activeView === 'todos' ? 'todos-grupos' : 'grupo-' + activeView;
  var fname = 'bolao_selecoes_' + groupLabel + '.png';
  var imgs = Array.from(container.querySelectorAll('img.team-flag'));
  var origSrcs = imgs.map(function(img) { return img.src; });
  Promise.all(imgs.map(imgToDataURL)).then(function() {
    html2canvas(container, {
      scale: 2,
      useCORS: false,
      allowTaint: false,
      backgroundColor: '#f0f2f5',
      logging: false
    }).then(function(canvas) {
      imgs.forEach(function(img, i) {
        img.src = origSrcs[i];
        img.style.visibility = '';
      });
      var a = document.createElement('a');
      a.download = fname;
      a.href = canvas.toDataURL('image/png');
      a.click();
    });
  });
}
