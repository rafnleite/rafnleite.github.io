<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ranking de Seleções – Bolão Copa 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="bolao_header.js"></script>
<link rel="stylesheet" href="bolao_styles.css">
<style>
:root {
  --pos-green: #166534;
  --pos-green-bg: #dcfce7;
  --pos-red: #991b1b;
  --pos-red-bg: #fee2e2;
  --sg-pos: #166534;
  --sg-neg: #991b1b;
}
/* ── MAIN LAYOUT ───────────────────────────── */
.main-layout {
  display: flex;
  align-items: flex-start;
  min-height: calc(100vh - 56px);
}
/* Right sidebar — sticky, full-height */
.sidebar {
  width: 210px;
  flex-shrink: 0;
  position: sticky;
  top: 56px;
  height: calc(100vh - 56px);
  overflow-y: auto;
  background: var(--white);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  order: 2;
}
.sidebar-section {
  border-bottom: 1px solid var(--border);
  display: flex;
  flex-direction: column;
}
.sidebar-section-head {
  padding: 10px 14px 8px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: #fafafa;
  flex-shrink: 0;
}
.sidebar-section-title {
  font-family: 'Bebas Neue', cursive;
  font-size: 0.88rem;
  letter-spacing: 2px;
  color: var(--text);
}
.sidebar-count {
  font-size: 0.6rem;
  color: var(--sub);
  font-weight: 600;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 1px 6px;
}
.sidebar-actions {
  padding: 5px 10px;
  display: flex;
  gap: 5px;
  flex-shrink: 0;
}
.sidebar-btn {
  flex: 1;
  font-family: 'Inter', sans-serif;
  font-size: 0.65rem;
  font-weight: 600;
  padding: 3px 4px;
  border-radius: 5px;
  border: 1.5px solid var(--border);
  background: var(--white);
  color: var(--sub);
  cursor: pointer;
  transition: all .12s;
}
.sidebar-btn:hover {
  background: var(--accent);
  border-color: var(--accent);
  color: white;
}
.sidebar-list {
  padding: 3px 0 6px;
  overflow-y: auto;
  flex: 1;
}
/* group tabs in sidebar — vertical list */
.sidebar-tabs {
  padding: 5px 6px;
  display: flex;
  flex-direction: column;
  gap: 2px;
  overflow-y: auto;
}
.gtab {
  font-family: 'Inter', sans-serif;
  font-size: 0.71rem;
  font-weight: 600;
  padding: 6px 10px;
  border-radius: 6px;
  border: 1.5px solid transparent;
  background: transparent;
  color: var(--sub);
  cursor: pointer;
  transition: all .12s;
  text-align: left;
  width: 100%;
}
.gtab:hover { background: var(--bg); color: var(--text); }
.gtab.active {
  background: var(--accent-light);
  color: var(--accent);
  font-weight: 700;
  border-color: #bbf7d0;
}
.gtab-disabled {
  opacity: .38;
  cursor: not-allowed;
  font-style: italic;
}
.p-check {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 3px 12px;
  font-size: 0.7rem;
  color: var(--text);
  cursor: pointer;
  user-select: none;
  line-height: 1.6;
}
.p-check:hover { background: var(--bg); }
.p-check input { cursor: pointer; accent-color: var(--accent); flex-shrink: 0; }
/* Content area — centered in remaining space */
.main-content {
  flex: 1;
  min-width: 0;
  padding: 24px 20px 72px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  max-width: 860px;
  margin: 0 auto;
  order: 1;
}
/* hide old horizontal tabs card */
.group-tabs-card { display: none; }

/* ── STANDINGS TABLE ──────────────────────── */
.stand-wrap {
  overflow-x: auto;
}
.stand-table {
  width: 100%;
  border-collapse: collapse;
  min-width: 560px;
}
.stand-table th {
  padding: 8px 10px;
  font-size: 0.58rem;
  font-weight: 700;
  letter-spacing: 1.1px;
  text-transform: uppercase;
  color: var(--sub);
  text-align: right;
  border-bottom: 1px solid var(--border);
  background: #f5f6f8;
  white-space: nowrap;
}
.stand-table th.left { text-align: left; }
.stand-table th.center { text-align: center; }

.stand-table td {
  padding: 9px 10px;
  border-bottom: 1px solid var(--border);
  font-size: 0.8rem;
  vertical-align: middle;
  text-align: right;
  white-space: nowrap;
}
.stand-table tr:last-child td { border-bottom: none; }
.stand-table tr:hover td { background: #f9fafb; }

.td-pos {
  font-family: 'Bebas Neue', cursive;
  font-size: 1rem;
  color: var(--light);
  text-align: center;
  width: 28px;
}

.td-team {
  text-align: left;
  min-width: 150px;
}
.team-cell {
  display: flex;
  align-items: center;
  gap: 9px;
}
.team-flag {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  object-fit: cover;
  border: 1px solid var(--border);
  flex-shrink: 0;
  background: var(--bg);
}
.team-name {
  font-weight: 600;
  font-size: 0.82rem;
  color: var(--text);
}
.team-group-badge {
  font-size: 0.55rem;
  font-weight: 700;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  padding: 1px 5px;
  border-radius: 4px;
  background: var(--bg);
  color: var(--sub);
  border: 1px solid var(--border);
  flex-shrink: 0;
}

.td-pts {
  font-family: 'Bebas Neue', cursive;
  font-size: 1.25rem;
  letter-spacing: 1px;
  color: var(--text);
}
.td-num {
  color: var(--sub);
  font-size: 0.78rem;
  font-weight: 500;
}
.td-sg-pos {
  font-weight: 700;
  color: var(--sg-pos);
}
.td-sg-neg {
  font-weight: 700;
  color: var(--sg-neg);
}
.td-sg-zero {
  color: var(--sub);
  font-weight: 500;
}

/* colored rank stripe on left — group view */
.stand-table tr.rank-q td:first-child { border-left: 3px solid #1d4ed8; }
.stand-table tr.rank-q td { background: #eff6ff; }
.stand-table tr.rank-q:hover td { background: #dbeafe; }
.stand-table tr.rank-3rd td:first-child { border-left: 3px solid #d97706; }
.stand-table tr.rank-3rd td { background: #fffbeb; }
.stand-table tr.rank-3rd:hover td { background: #fef3c7; }
/* top-8 terceiros highlight */
.stand-table tr.rank-top8 td:first-child { border-left: 3px solid #1d4ed8; }
.stand-table tr.rank-top8 td { background: #eff6ff; }
.stand-table tr.rank-top8:hover td { background: #dbeafe; }

/* ── TODOS GAP ─────────────────────────────── */
.todos-groups-wrap {
  display: flex;
  flex-direction: column;
  gap: 28px;
}

/* ── INFO STRIP ────────────────────────────── */
.info-strip {
  padding: 9px 18px;
  font-size: 0.72rem;
  color: var(--sub);
  border-bottom: 1px solid var(--border);
  background: #fcfcfd;
  line-height: 1.6;
}

/* ── RESPONSIVE ────────────────────────────── */
/* ── MOBILE DRAWER ───────────────────────── */
.mob-fab {
  display: none;
  position: fixed; bottom: 18px; right: 18px; z-index: 400;
  background: var(--accent); color: #fff;
  border: none; border-radius: 28px;
  padding: 10px 18px 10px 14px;
  font-family: 'Inter', sans-serif; font-size: 0.78rem; font-weight: 700;
  box-shadow: 0 4px 16px rgba(0,0,0,.22);
  cursor: pointer; align-items: center; gap: 7px;
  transition: opacity .15s;
}
.mob-fab:hover { opacity: .88; }
.mob-overlay {
  display: none; position: fixed; inset: 0; z-index: 500;
  background: rgba(0,0,0,.4); backdrop-filter: blur(2px);
}
.mob-overlay.open { display: block; }
.mob-drawer {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 501;
  background: var(--white); border-radius: 18px 18px 0 0;
  box-shadow: 0 -4px 32px rgba(0,0,0,.18);
  max-height: 82vh; display: flex; flex-direction: column;
  transform: translateY(100%); transition: transform .28s cubic-bezier(.4,0,.2,1);
}
.mob-drawer.open { transform: translateY(0); }
.mob-drawer-handle {
  flex-shrink: 0; display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px 10px;
  border-bottom: 1px solid var(--border);
}
.mob-drawer-title {
  font-family: 'Bebas Neue', cursive; font-size: 1rem; letter-spacing: 2px; color: var(--text);
}
.mob-drawer-close {
  background: none; border: none; font-size: 1.3rem; color: var(--sub);
  cursor: pointer; line-height: 1; padding: 2px 4px;
}
.mob-drawer-body { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
/* ── Collapsible drawer sections ── */
.mob-section-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 11px 16px; cursor: pointer; user-select: none;
  border-bottom: 1px solid var(--border); background: #fafafa;
}
.mob-section-title {
  font-family: 'Bebas Neue', cursive; font-size: 0.88rem;
  letter-spacing: 2px; color: var(--text);
  display: flex; align-items: center; gap: 8px;
}
.mob-section-chevron {
  color: var(--sub); transition: transform .2s; flex-shrink: 0;
}
.mob-section-head.open .mob-section-chevron { transform: rotate(180deg); }
.mob-section-body {
  display: none; border-bottom: 1px solid var(--border);
}
.mob-section-body.open { display: block; }
@media (max-width: 700px) {
  .sidebar { display: none; }
  .main-content { padding: 12px 10px 72px; max-width: 100%; }
  .team-group-badge { display: none; }
  .stand-table { min-width: 440px; }
  .mob-fab { display: flex; }
}
@media (max-width: 480px) {
  .stand-table { min-width: 0; font-size: 0.72rem; }
  .stand-table th, .stand-table td { padding: 6px 7px; }
}
/* ── MODE CHECKBOX ─────────────────────── */
.sidebar-mode-label {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 12px;
  font-size: 0.72rem;
  color: var(--text);
  cursor: pointer;
  user-select: none;
  line-height: 1.5;
  width: 100%;
}
.sidebar-mode-label input {
  cursor: pointer;
  accent-color: var(--accent);
  flex-shrink: 0;
  margin-top: 2px;
}</style>
</head>
<body>

<div id="site-header"></div>
<script>injectHeader('selecoes','Ranking de Seleções');</script>

<div id="loading-overlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">Carregando dados...</div>
</div>

<main class="main-layout">

  <aside class="sidebar">
    <!-- Mode checkbox -->
    <div class="sidebar-section" style="border-bottom:1px solid var(--border)">
      <label class="sidebar-mode-label">
        <input type="checkbox" id="use-results" onchange="onModeChange(this)">
        <span>Substituir jogos já ocorridos por resultados reais</span>
      </label>
    </div>
    <!-- Group navigation -->
    <div class="sidebar-section">
      <div class="sidebar-section-head">
        <span class="sidebar-section-title">Grupos</span>
      </div>
      <div class="sidebar-tabs" id="group-tabs"></div>
    </div>
    <!-- Participant filter -->
    <div class="sidebar-section" style="flex:1;overflow:hidden;display:flex;flex-direction:column">
      <div class="sidebar-section-head">
        <span class="sidebar-section-title">Apostadores</span>
        <span class="sidebar-count" id="sidebar-count"></span>
      </div>
      <div class="sidebar-actions">
        <button class="sidebar-btn" onclick="selectAll()">Todos</button>
        <button class="sidebar-btn" onclick="selectNone()">Nenhum</button>
      </div>
      <div class="sidebar-list" id="participant-list"></div>
    </div>
  </aside>

  <div class="main-content" style="position:relative">
    <button class="btn-img" onclick="exportImage()" title="Salvar imagem" style="position:absolute;top:12px;right:12px;z-index:10">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
        <polyline points="7,10 12,15 17,10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
    </button>
    <div id="tables-container"></div>
  </div>

</main>

<!-- ── MOBILE FAB + DRAWER ──────────────── -->
<button class="mob-fab" id="mob-fab" onclick="openMobDrawer()">
  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  Filtros
</button>
<div class="mob-overlay" id="mob-overlay" onclick="closeMobDrawer()"></div>
<div class="mob-drawer" id="mob-drawer">
  <div class="mob-drawer-handle">
    <span class="mob-drawer-title">Filtros</span>
    <button class="mob-drawer-close" onclick="closeMobDrawer()">✕</button>
  </div>
  <div class="mob-drawer-body">
    <!-- Mode checkbox -->
    <div style="border-bottom:1px solid var(--border)">
      <label class="sidebar-mode-label">
        <input type="checkbox" id="use-results-mob" onchange="onModeChangeMob(this)">
        <span>Substituir jogos já ocorridos por resultados reais</span>
      </label>
    </div>
    <!-- Group navigation -->
    <div>
      <div class="mob-section-head open" onclick="toggleMobSection(this)">
        <span class="mob-section-title">Grupos</span>
        <svg class="mob-section-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6,9 12,15 18,9"/></svg>
      </div>
      <div class="mob-section-body open">
        <div class="sidebar-tabs" id="group-tabs-mob" style="flex-direction:row;flex-wrap:wrap;padding:8px 10px;gap:6px"></div>
      </div>
    </div>
    <!-- Participant filter -->
    <div style="flex:1;overflow:hidden;display:flex;flex-direction:column">
      <div class="mob-section-head open" onclick="toggleMobSection(this)">
        <span class="mob-section-title">
          Apostadores
          <span class="sidebar-count" id="sidebar-count-mob"></span>
        </span>
        <svg class="mob-section-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6,9 12,15 18,9"/></svg>
      </div>
      <div class="mob-section-body open">
        <div class="sidebar-actions">
          <button class="sidebar-btn" onclick="selectAll()">Todos</button>
          <button class="sidebar-btn" onclick="selectNone()">Nenhum</button>
        </div>
        <div class="sidebar-list" id="participant-list-mob" style="overflow-y:auto;max-height:260px"></div>
      </div>
    </div>
  </div>
</div>

<script src="bolao_utils.js"></script>
<script>
let JOGOS = [];

async function buildJogos() {
  var results = await Promise.all([
    fetchAll('/jogo'), fetchAll('/aposta'), fetchAll('/grupo'),
    fetchAll('/time'), fetchAll('/chutador')
  ]);
  var jogos = results[0], apostas = results[1], grupos = results[2],
      times = results[3], chutadores = results[4];
  var grupoMap = {}, timeMap = {}, chutadorMap = {}, apostaPorJogo = {};
  grupos.forEach(function(g) { grupoMap[g.id_grupo] = g; });
  times.forEach(function(t) { timeMap[t.id_time] = t; });
  chutadores.forEach(function(c) { chutadorMap[c.id_chutador] = c; });
  apostas.forEach(function(a) {
    if (!apostaPorJogo[a.id_jogo]) apostaPorJogo[a.id_jogo] = [];
    apostaPorJogo[a.id_jogo].push(a);
  });
  var list = jogos.map(function(j) {
    var grupo = grupoMap[j.id_grupo] || {}, timeA = timeMap[j.id_time_a] || {},
        timeB = timeMap[j.id_time_b] || {};
    var apostadores_a = [], apostadores_empate = [], apostadores_b = [];
    (apostaPorJogo[j.id_jogo] || []).forEach(function(a) {
      var ch = chutadorMap[a.id_chutador] || {};
      var entry = { nome: ch.nome || '?', placar: a.gols_a + 'x' + a.gols_b };
      if (a.gols_a > a.gols_b) apostadores_a.push(entry);
      else if (a.gols_a < a.gols_b) apostadores_b.push(entry);
      else apostadores_empate.push(entry);
    });
    var dataLocal = j.data ? j.data.slice(0, 16).replace('T', ' ') : null;
    return {
      id: j.id_jogo, data: dataLocal, estadio: j.estadio, cidade: j.cidade,
      grupo: grupo.sigla || '', sede: grupo.sede || '',
      time_a: { nome: timeA.nome || '', logo: timeA.logo || '', id: j.id_time_a },
      time_b: { nome: timeB.nome || '', logo: timeB.logo || '', id: j.id_time_b },
      gols_a: j.gols_a, gols_b: j.gols_b, status: j.status_jogo,
      apostadores_a: apostadores_a, apostadores_empate: apostadores_empate,
      apostadores_b: apostadores_b
    };
  });
  list.sort(function(a, b) { return (!a.data ? 1 : !b.data ? -1 : a.data < b.data ? -1 : a.data > b.data ? 1 : 0); });
  await applyESPNOverrides(list);
  return list;
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function fmt1(v) { return v.toFixed(1); }
function fmt2(v) { return v.toFixed(2); }
function fmtSG(v) {
  var s = v.toFixed(2);
  if (v > 0.005) return '+' + s;
  if (v < -0.005) return s;
  return '0.00';
}

// ── Module-level state (populated in init) ──────────────────────────────────
var allParticipants = [];
var groups = [];
var useActualResults = false;

function onModeChange(cb) {
  useActualResults = cb.checked;
  // keep both checkboxes in sync
  var chk0 = document.getElementById('use-results');
  var chkM = document.getElementById('use-results-mob');
  if (chk0) chk0.checked = cb.checked;
  if (chkM) chkM.checked = cb.checked;
  computeAllTeams();
  renderContent();
}
function onModeChangeMob(cb) { onModeChange(cb); }

// ── Mobile drawer ─────────────────────────────────────────────────────────────
function openMobDrawer() {
  document.getElementById('mob-drawer').classList.add('open');
  document.getElementById('mob-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeMobDrawer() {
  document.getElementById('mob-drawer').classList.remove('open');
  document.getElementById('mob-overlay').classList.remove('open');
  document.body.style.overflow = '';
}
function toggleMobSection(headEl) {
  headEl.classList.toggle('open');
  var body = headEl.nextElementSibling;
  if (body) body.classList.toggle('open');
}
// ── State ─────────────────────────────────────────────────────────────────────
var activeView = 'total'; // 'total', 'todos', or a group letter
var selectedParticipants = new Set();
var allTeams = [];

// ── Compute team stats from filtered apostas ──────────────────────────────────
function computeAllTeams() {
  var teamsMap = {};
  function getOrCreate(id, nome, logo, grupo) {
    if (!teamsMap[id]) teamsMap[id] = { id: id, nome: nome, logo: logo, grupo: grupo,
      jogos: 0, expV: 0, expE: 0, expD: 0, expGF: 0, expGC: 0 };
    return teamsMap[id];
  }
  JOGOS.forEach(function(j) {
    var tA = getOrCreate(j.time_a.id, j.time_a.nome, j.time_a.logo, j.grupo);
    var tB = getOrCreate(j.time_b.id, j.time_b.nome, j.time_b.logo, j.grupo);
    if (useActualResults && j.gols_a !== null && j.gols_b !== null) {
      // Use actual match result
      var vA = j.gols_a > j.gols_b ? 1 : 0;
      var e  = j.gols_a === j.gols_b ? 1 : 0;
      var vB = j.gols_a < j.gols_b ? 1 : 0;
      tA.jogos++; tA.expV += vA; tA.expE += e; tA.expD += vB;
      tA.expGF += j.gols_a; tA.expGC += j.gols_b;
      tB.jogos++; tB.expV += vB; tB.expE += e; tB.expD += vA;
      tB.expGF += j.gols_b; tB.expGC += j.gols_a;
    } else {
      var fA = j.apostadores_a.filter(function(a) { return selectedParticipants.has(a.nome); });
      var fE = j.apostadores_empate.filter(function(a) { return selectedParticipants.has(a.nome); });
      var fB = j.apostadores_b.filter(function(a) { return selectedParticipants.has(a.nome); });
      var nA = fA.length, nE = fE.length, nB = fB.length;
      var total = nA + nE + nB;
      if (total === 0) return;
      var allApostas = fA.concat(fE, fB);
      var sumGA = 0, sumGB = 0;
      allApostas.forEach(function(a) {
        var parts = (a.placar || '0x0').split('x');
        sumGA += (parseInt(parts[0]) || 0);
        sumGB += (parseInt(parts[1]) || 0);
      });
      var avgGA = sumGA / total, avgGB = sumGB / total;
      tA.jogos++; tA.expV += nA/total; tA.expE += nE/total; tA.expD += nB/total;
      tA.expGF += avgGA; tA.expGC += avgGB;
      tB.jogos++; tB.expV += nB/total; tB.expE += nE/total; tB.expD += nA/total;
      tB.expGF += avgGB; tB.expGC += avgGA;
    }
  });
  allTeams = Object.values(teamsMap).map(function(t) {
    return Object.assign({}, t, { pts: t.expV*3 + t.expE, sg: t.expGF - t.expGC });
  });
}

// ── Sort function: pts desc → sg desc → gf desc → alphabetical ──────────────
function sortTeams(arr) {
  return arr.slice().sort(function(a, b) {
    var dp = b.pts - a.pts;
    if (Math.abs(dp) > 0.0001) return dp;
    var ds = b.sg - a.sg;
    if (Math.abs(ds) > 0.0001) return ds;
    var dg = b.expGF - a.expGF;
    if (Math.abs(dg) > 0.0001) return dg;
    return a.nome.localeCompare(b.nome, 'pt-BR', { sensitivity: 'base' });
  });
}

// ── Render tabs ───────────────────────────────────────────────────────────────
function renderTabs() {
  // Fixed phase list — only 'total' and 'todos' are active in the group stage
  var PHASES = [
    { id: 'total',   label: 'Geral',                    active: true },
    { id: 'todos',   label: 'Por grupos',               active: true },
    { id: 'r16',     label: '16 avos',                  active: false },
    { id: 'r8',      label: 'Oitavas',                  active: false },
    { id: 'r4',      label: 'Quartas',                  active: false },
    { id: 'semi',    label: 'Semis',                    active: false },
    { id: '3rd',     label: '3º lugar',                 active: false },
    { id: 'final',   label: 'Final',                    active: false }
  ];
  var html = PHASES.map(function(p) {
    if (!p.active) {
      return '<button class="gtab gtab-disabled" disabled title="Em breve">' + p.label + '</button>';
    }
    var cls = 'gtab' + (activeView === p.id ? ' active' : '');
    return '<button class="' + cls + '" onclick="switchView(\'' + p.id + '\')">' + p.label + '</button>';
  }).join('');
  document.getElementById('group-tabs').innerHTML     = html;
  document.getElementById('group-tabs-mob').innerHTML = html;
}

// ── Build standings row HTML ──────────────────────────────────────────────────
function rowHtml(t, pos, showGroup, rankClass) {
  if (rankClass === undefined) rankClass = '';
  var sgClass = t.sg > 0.005 ? 'td-sg-pos' : t.sg < -0.005 ? 'td-sg-neg' : 'td-sg-zero';
  var flagHtml = t.logo
    ? '<img class="team-flag" src="' + t.logo + '" alt="' + t.nome + '" loading="lazy">'
    : '<div class="team-flag" style="background:var(--border)"></div>';
  var groupBadge = showGroup
    ? '<span class="team-group-badge">Grp ' + (t._grupo || t.grupo) + '</span>'
    : '';

  return '<tr class="' + rankClass + '">' +
    '<td class="td-pos">' + pos + '</td>' +
    '<td class="td-team">' +
      '<div class="team-cell">' +
        flagHtml +
        '<span class="team-name">' + t.nome + '</span>' +
        groupBadge +
      '</div>' +
    '</td>' +
    '<td class="td-num">' + t.jogos + '</td>' +
    '<td class="td-num">' + fmt2(t.expV) + '</td>' +
    '<td class="td-num">' + fmt2(t.expE) + '</td>' +
    '<td class="td-num">' + fmt2(t.expD) + '</td>' +
    '<td class="td-num">' + fmt2(t.expGF) + '</td>' +
    '<td class="td-num">' + fmt2(t.expGC) + '</td>' +
    '<td class="' + sgClass + '">' + fmtSG(t.sg) + '</td>' +
    '<td class="td-pts">' + fmt2(t.pts) + '</td>' +
  '</tr>';
}

// ── Build a standings table card ──────────────────────────────────────────────
// showInfo: show the info strip; showSubtitle: show subtitle in card-head
// mode: 'group' (highlight top-2 blue, 3rd amber), 'terceiros' (highlight top-8 blue), 'geral' (no highlight)
function tableCardHtml(title, subtitle, teamsArr, showGroup, showInfo, showSubtitle, mode) {
  if (showInfo === undefined) showInfo = true;
  if (showSubtitle === undefined) showSubtitle = true;
  if (mode === undefined) mode = 'geral';
  var sorted = sortTeams(teamsArr);
  var rows = sorted.map(function(t, i) {
    var pos = i + 1;
    var rc = '';
    if (mode === 'group') {
      if (pos <= 2) rc = 'rank-q';
      else if (pos === 3) rc = 'rank-3rd';
    } else if (mode === 'terceiros') {
      if (pos <= 8) rc = 'rank-top8';
    }
    return rowHtml(t, pos, showGroup, rc);
  }).join('');

  return '<div class="card">' +
    '<div class="card-head">' +
      '<span class="card-head-title">' + title + '</span>' +
      (showSubtitle && subtitle ? '<span class="card-head-sub">' + subtitle + '</span>' : '') +
    '</div>' +
    (showInfo ? '<div class="info-strip">' +
      (useActualResults
        ? '<strong style="color:var(--text)">Resultados reais</strong> usados para jogos encerrados · jogos futuros usam palpites dos apostadores selecionados. Desempate: Pontos → Saldo → Gols pró.'
        : '<strong style="color:var(--text)">Valores esperados</strong> calculados a partir das apostas: pontos = vitórias × 3 + empates; saldo = gols pró − gols contra. Desempate: Pontos → Saldo → Gols pró.') +
    '</div>' : '') +
    '<div class="stand-wrap">' +
      '<table class="stand-table">' +
        '<thead><tr>' +
          '<th class="center">#</th>' +
          '<th class="left">Seleção</th>' +
          '<th title="Jogos">J</th>' +
          '<th title="Vitórias esperadas">V</th>' +
          '<th title="Empates esperados">E</th>' +
          '<th title="Derrotas esperadas">D</th>' +
          '<th title="Gols pró esperados">GP</th>' +
          '<th title="Gols contra esperados">GC</th>' +
          '<th title="Saldo de gols esperado">SG</th>' +
          '<th title="Pontos esperados">Pts</th>' +
        '</tr></thead>' +
        '<tbody>' + rows + '</tbody>' +
      '</table>' +
    '</div>' +
  '</div>';
}

// ── Render content area ───────────────────────────────────────────────────────
function renderContent() {
  var container = document.getElementById('tables-container');
  var html = '';

  if (activeView === 'total') {
    html = tableCardHtml('Classificação Geral', 'Todas as seleções · ' + allTeams.length + ' equipes', allTeams, true);
  } else if (activeView === 'todos') {
    // One compact card per group (no info strip, no subtitle)
    var groupCards = groups.map(function(g) {
      var groupTeams = allTeams.filter(function(t) { return t.grupo === g; });
      return tableCardHtml('Grupo ' + g, '', groupTeams, false, false, false, 'group');
    }).join('');
    // Best 3rd-place teams card
    var terceiros = groups.map(function(g) {
      var groupTeams = sortTeams(allTeams.filter(function(t) { return t.grupo === g; }));
      return groupTeams[2] ? Object.assign({}, groupTeams[2], { _grupo: g }) : null;
    }).filter(Boolean);
    var terceirosCard = tableCardHtml(
      'Melhores 3º Colocados',
      'Top 8 avançam — critério: Pontos → Saldo de gols → Gols pró',
      terceiros, true, false, true, 'terceiros'
    );
    html = '<div class="todos-groups-wrap">' + groupCards + terceirosCard + '</div>';
  }

  container.innerHTML = html;
}

// ── Switch view ───────────────────────────────────────────────────────────────
function switchView(view) {
  activeView = view;
  renderTabs();
  renderContent();
}

// ── Sidebar ─────────────────────────────────────────────────────────────
function renderSidebar() {
  var html = allParticipants.map(function(p) {
    var chk = selectedParticipants.has(p) ? ' checked' : '';
    return '<label class="p-check"><input type="checkbox" value="' +
      p.replace(/"/g, '&quot;') + '"' + chk + ' onchange="toggleParticipant(this)"> ' + p + '</label>';
  }).join('');
  document.getElementById('participant-list').innerHTML     = html;
  document.getElementById('participant-list-mob').innerHTML = html;
  var badge = selectedParticipants.size + ' / ' + allParticipants.length;
  document.getElementById('sidebar-count').textContent     = badge;
  document.getElementById('sidebar-count-mob').textContent = badge;
}

function toggleParticipant(cb) {
  if (cb.checked) selectedParticipants.add(cb.value);
  else selectedParticipants.delete(cb.value);
  // keep both lists in sync
  ['participant-list', 'participant-list-mob'].forEach(function(listId) {
    var el = document.getElementById(listId);
    if (!el) return;
    el.querySelectorAll('input[type=checkbox]').forEach(function(input) {
      input.checked = selectedParticipants.has(input.value);
    });
  });
  var badge = selectedParticipants.size + ' / ' + allParticipants.length;
  document.getElementById('sidebar-count').textContent     = badge;
  document.getElementById('sidebar-count-mob').textContent = badge;
  computeAllTeams();
  renderContent();
}

function selectAll() {
  selectedParticipants = new Set(allParticipants);
  renderSidebar(); computeAllTeams(); renderContent();
}

function selectNone() {
  selectedParticipants = new Set();
  renderSidebar(); computeAllTeams(); renderContent();
}

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  try {
    JOGOS = await buildJogos();
  } catch(e) {
    document.getElementById('loading-overlay').innerHTML =
      '<div class="loading-text">Erro ao carregar dados. Tente recarregar a página.</div>';
    return;
  }
  document.getElementById('loading-overlay').style.display = 'none';
  var seen1 = {}, seen2 = {};
  JOGOS.forEach(function(j) {
    [].concat(j.apostadores_a, j.apostadores_empate, j.apostadores_b).forEach(function(a) {
      if (!seen1[a.nome]) { seen1[a.nome] = true; allParticipants.push(a.nome); }
    });
    if (!seen2[j.grupo]) { seen2[j.grupo] = true; groups.push(j.grupo); }
  });
  allParticipants.sort(function(a, b) { return a.localeCompare(b, 'pt-BR', { sensitivity: 'base' }); });
  groups.sort();
  selectedParticipants = new Set(allParticipants);
  computeAllTeams();
  renderSidebar();
  renderTabs();
  renderContent();
}
init();

// ── Image export ───────────────────────────────────────────────────────────────
function imgToDataURL(img) {
  return new Promise(function(resolve) {
    if (!img.src || img.src.startsWith('data:')) { resolve(); return; }
    var original = img.src;
    var size = 48; // 24px * scale:2
    var canvas = document.createElement('canvas');
    canvas.width = size;
    canvas.height = size;
    var ctx = canvas.getContext('2d');
    var ci = new Image();
    ci.crossOrigin = 'anonymous';
    ci.onload = function() {
      var iw = ci.naturalWidth  || ci.width;
      var ih = ci.naturalHeight || ci.height;
      var scale = Math.max(size / iw, size / ih);
      var sw = iw * scale;
      var sh = ih * scale;
      var sx = (size - sw) / 2;
      var sy = (size - sh) / 2;
      try {
        ctx.drawImage(ci, sx, sy, sw, sh);
        img.src = canvas.toDataURL('image/png');
      } catch(e) {
        img.style.visibility = 'hidden';
      }
      resolve();
    };
    ci.onerror = function() { img.style.visibility = 'hidden'; resolve(); };
    ci.src = original + (original.includes('?') ? '&' : '?') + '_cb=' + Date.now();
  });
}

function exportImage() {
  var container = document.getElementById('tables-container');
  var groupLabel = activeView === 'total' ? 'geral' : activeView === 'todos' ? 'todos-grupos' : 'grupo-' + activeView;
  var fname = 'bolao_selecoes_' + groupLabel + '.png';
  var imgs = Array.from(container.querySelectorAll('img.team-flag'));
  var origSrcs = imgs.map(function(img) { return img.src; });
  Promise.all(imgs.map(imgToDataURL)).then(function() {
    html2canvas(container, {
      scale: 2,
      useCORS: false,
      allowTaint: false,
      backgroundColor: '#f0f2f5',
      logging: false
    }).then(function(canvas) {
      imgs.forEach(function(img, i) {
        img.src = origSrcs[i];
        img.style.visibility = '';
      });
      var a = document.createElement('a');
      a.download = fname;
      a.href = canvas.toDataURL('image/png');
      a.click();
    });
  });
}
</script>
