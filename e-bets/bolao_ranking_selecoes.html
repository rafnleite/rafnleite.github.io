<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>e-BÉTS - Ranking de Seleções</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="bolao_header.js"></script>
<link rel="stylesheet" href="bolao_styles.css">
<style>
:root {
  --pos-green: #166534;
  --pos-green-bg: #dcfce7;
  --pos-red: #991b1b;
  --pos-red-bg: #fee2e2;
  --sg-pos: #166534;
  --sg-neg: #991b1b;
}
/* ── MAIN LAYOUT ───────────────────────────── */
.main-layout {
  display: flex;
  align-items: flex-start;
  min-height: calc(100vh - 56px);
}
/* Right sidebar — sticky, full-height */
.sidebar {
  width: 210px;
  flex-shrink: 0;
  position: sticky;
  top: 56px;
  height: calc(100vh - 56px);
  overflow-y: auto;
  background: var(--white);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  order: 2;
}
.sidebar-section {
  border-bottom: 1px solid var(--border);
  display: flex;
  flex-direction: column;
}
.sidebar-section-head {
  padding: 10px 14px 8px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: #fafafa;
  flex-shrink: 0;
}
.sidebar-section-title {
  font-family: 'Bebas Neue', cursive;
  font-size: 0.88rem;
  letter-spacing: 2px;
  color: var(--text);
}
.sidebar-count {
  font-size: 0.6rem;
  color: var(--sub);
  font-weight: 600;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 1px 6px;
}
.sidebar-actions {
  padding: 5px 10px;
  display: flex;
  gap: 5px;
  flex-shrink: 0;
}
.sidebar-btn {
  flex: 1;
  font-family: 'Inter', sans-serif;
  font-size: 0.65rem;
  font-weight: 600;
  padding: 3px 4px;
  border-radius: 5px;
  border: 1.5px solid var(--border);
  background: var(--white);
  color: var(--sub);
  cursor: pointer;
  transition: all .12s;
}
.sidebar-btn:hover {
  background: var(--accent);
  border-color: var(--accent);
  color: white;
}
.sidebar-list {
  padding: 3px 0 6px;
  overflow-y: auto;
  flex: 1;
}
/* group tabs in sidebar — vertical list */
.sidebar-tabs {
  padding: 5px 6px;
  display: flex;
  flex-direction: column;
  gap: 2px;
  overflow-y: auto;
}
.gtab {
  font-family: 'Inter', sans-serif;
  font-size: 0.71rem;
  font-weight: 600;
  padding: 6px 10px;
  border-radius: 6px;
  border: 1.5px solid transparent;
  background: transparent;
  color: var(--sub);
  cursor: pointer;
  transition: all .12s;
  text-align: left;
  width: 100%;
}
.gtab:hover { background: var(--bg); color: var(--text); }
.gtab.active {
  background: var(--accent-light);
  color: var(--accent);
  font-weight: 700;
  border-color: #bbf7d0;
}
.gtab-disabled {
  opacity: .38;
  cursor: not-allowed;
  font-style: italic;
}
.p-check {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 3px 12px;
  font-size: 0.7rem;
  color: var(--text);
  cursor: pointer;
  user-select: none;
  line-height: 1.6;
}
.p-check:hover { background: var(--bg); }
.p-check input { cursor: pointer; accent-color: var(--accent); flex-shrink: 0; }
/* Content area — centered in remaining space */
.main-content {
  flex: 1;
  min-width: 0;
  padding: 24px 20px 72px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  max-width: 860px;
  margin: 0 auto;
  order: 1;
}
/* hide old horizontal tabs card */
.group-tabs-card { display: none; }

/* ── STANDINGS TABLE ──────────────────────── */
.stand-wrap {
  overflow-x: auto;
}
.stand-table {
  width: 100%;
  border-collapse: collapse;
  min-width: 560px;
}
.stand-table th {
  padding: 8px 10px;
  font-size: 0.58rem;
  font-weight: 700;
  letter-spacing: 1.1px;
  text-transform: uppercase;
  color: var(--sub);
  text-align: right;
  border-bottom: 1px solid var(--border);
  background: #f5f6f8;
  white-space: nowrap;
}
.stand-table th.left { text-align: left; }
.stand-table th.center { text-align: center; }

.stand-table td {
  padding: 9px 10px;
  border-bottom: 1px solid var(--border);
  font-size: 0.8rem;
  vertical-align: middle;
  text-align: right;
  white-space: nowrap;
}
.stand-table tr:last-child td { border-bottom: none; }
.stand-table tr:hover td { background: #f9fafb; }

.td-pos {
  font-family: 'Bebas Neue', cursive;
  font-size: 1rem;
  color: var(--light);
  text-align: center;
  width: 28px;
}

.td-team {
  text-align: left;
  min-width: 150px;
}
.team-cell {
  display: flex;
  align-items: center;
  gap: 9px;
}
.team-flag {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  object-fit: cover;
  border: 1px solid var(--border);
  flex-shrink: 0;
  background: var(--bg);
}
.team-name {
  font-weight: 600;
  font-size: 0.82rem;
  color: var(--text);
}
.team-group-badge {
  font-size: 0.55rem;
  font-weight: 700;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  padding: 1px 5px;
  border-radius: 4px;
  background: var(--bg);
  color: var(--sub);
  border: 1px solid var(--border);
  flex-shrink: 0;
}

.td-pts {
  font-family: 'Bebas Neue', cursive;
  font-size: 1.25rem;
  letter-spacing: 1px;
  color: var(--text);
}
.td-num {
  color: var(--sub);
  font-size: 0.78rem;
  font-weight: 500;
}
.td-sg-pos {
  font-weight: 700;
  color: var(--sg-pos);
}
.td-sg-neg {
  font-weight: 700;
  color: var(--sg-neg);
}
.td-sg-zero {
  color: var(--sub);
  font-weight: 500;
}

/* colored rank stripe on left — group view */
.stand-table tr.rank-q td:first-child { border-left: 3px solid #1d4ed8; }
.stand-table tr.rank-q td { background: #eff6ff; }
.stand-table tr.rank-q:hover td { background: #dbeafe; }
.stand-table tr.rank-3rd td:first-child { border-left: 3px solid #d97706; }
.stand-table tr.rank-3rd td { background: #fffbeb; }
.stand-table tr.rank-3rd:hover td { background: #fef3c7; }
/* top-8 terceiros highlight */
.stand-table tr.rank-top8 td:first-child { border-left: 3px solid #1d4ed8; }
.stand-table tr.rank-top8 td { background: #eff6ff; }
.stand-table tr.rank-top8:hover td { background: #dbeafe; }

/* ── TODOS GAP ─────────────────────────────── */
.todos-groups-wrap {
  display: flex;
  flex-direction: column;
  gap: 28px;
}

/* ── INFO STRIP ────────────────────────────── */
.info-strip {
  padding: 9px 18px;
  font-size: 0.72rem;
  color: var(--sub);
  border-bottom: 1px solid var(--border);
  background: #fcfcfd;
  line-height: 1.6;
}

/* ── COMPARATIVOS TODOS GRUPOS ───────────────────────── */
.compare-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  padding: 12px 14px 14px;
}

.compare-quad {
  border: 1px solid var(--border);
  border-radius: 8px;
  background: #fff;
  padding: 10px;
  min-height: 86px;
}

.compare-quad-title {
  font-size: 0.62rem;
  font-weight: 700;
  letter-spacing: 0.7px;
  text-transform: uppercase;
  color: var(--sub);
  margin-bottom: 8px;
}

.team-chip-list {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.team-chip {
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 6px 8px;
  background: var(--bg);
  font-size: 0.64rem;
  color: var(--text);
  min-width: 72px;
}

.team-chip-flag {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  object-fit: cover;
  border: 1px solid var(--border);
  flex-shrink: 0;
  background: #fff;
}

.team-chip-name {
  text-align: center;
  line-height: 1.2;
  font-weight: 600;
}

.team-chip-empty {
  color: var(--light);
  font-size: 0.68rem;
}

.diff-table-wrap {
  overflow-x: auto;
}

.diff-table {
  width: 100%;
  border-collapse: collapse;
  min-width: 620px;
}

.diff-table th,
.diff-table td {
  border-bottom: 1px solid var(--border);
  vertical-align: top;
  padding: 8px 10px;
}

.diff-table th {
  background: #f5f6f8;
  text-align: left;
  font-size: 0.58rem;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--sub);
}

.diff-bettor {
  white-space: nowrap;
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--text);
}

.sortable {
  cursor: pointer;
  user-select: none;
}

.sort-ind {
  margin-left: 4px;
  color: var(--light);
}

.card-head-main {
  display: flex;
  align-items: baseline;
  gap: 10px;
  flex-wrap: wrap;
}

.card-head .card-actions {
  display: flex;
}

.section-export-head .card-actions {
  display: flex;
}

.section-export-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin: -4px 0 -10px;
}

.section-export-title {
  font-size: 0.7rem;
  letter-spacing: 1px;
  text-transform: uppercase;
  font-weight: 700;
  color: var(--sub);
}

.group-export-stack {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.td-center {
  text-align: center !important;
}

.status-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 3px 10px;
  border-radius: 999px;
  font-size: 0.66rem;
  font-weight: 700;
  letter-spacing: 0.4px;
  text-transform: uppercase;
  border: 1px solid transparent;
  white-space: nowrap;
}

.status-badge-ok {
  background: var(--pos-green-bg);
  color: var(--pos-green);
  border-color: #86efac;
}

.status-badge-no {
  background: var(--pos-red-bg);
  color: var(--pos-red);
  border-color: #fecaca;
}

.diff-table th:nth-child(1),
.diff-table td:nth-child(1) {
  width: 16%;
  min-width: 150px;
}

.diff-table th:nth-child(2),
.diff-table td:nth-child(2),
.diff-table th:nth-child(3),
.diff-table td:nth-child(3),
.diff-table th:nth-child(4),
.diff-table td:nth-child(4) {
  width: 28%;
}

.diff-table th:nth-child(2),
.diff-table td:nth-child(2) {
  width: 10%;
  min-width: 110px;
}

.outcome-table th:nth-child(1),
.outcome-table td:nth-child(1) {
  width: 50%;
}

.outcome-table th:nth-child(2),
.outcome-table td:nth-child(2) {
  width: 20%;
}

.outcome-table th:nth-child(3),
.outcome-table td:nth-child(3) {
  width: 30%;
}

/* ── RESPONSIVE ────────────────────────────── */
/* ── MOBILE DRAWER ───────────────────────── */
.mob-fab {
  display: none;
  position: fixed; bottom: 18px; right: 18px; z-index: 400;
  background: var(--accent); color: #fff;
  border: none; border-radius: 28px;
  padding: 10px 18px 10px 14px;
  font-family: 'Inter', sans-serif; font-size: 0.78rem; font-weight: 700;
  box-shadow: 0 4px 16px rgba(0,0,0,.22);
  cursor: pointer; align-items: center; gap: 7px;
  transition: opacity .15s;
}
.mob-fab:hover { opacity: .88; }
.mob-overlay {
  display: none; position: fixed; inset: 0; z-index: 500;
  background: rgba(0,0,0,.4); backdrop-filter: blur(2px);
}
.mob-overlay.open { display: block; }
.mob-drawer {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 501;
  background: var(--white); border-radius: 18px 18px 0 0;
  box-shadow: 0 -4px 32px rgba(0,0,0,.18);
  max-height: 82vh; display: flex; flex-direction: column;
  transform: translateY(100%); transition: transform .28s cubic-bezier(.4,0,.2,1);
}
.mob-drawer.open { transform: translateY(0); }
.mob-drawer-handle {
  flex-shrink: 0; display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px 10px;
  border-bottom: 1px solid var(--border);
}
.mob-drawer-title {
  font-family: 'Bebas Neue', cursive; font-size: 1rem; letter-spacing: 2px; color: var(--text);
}
.mob-drawer-close {
  background: none; border: none; font-size: 1.3rem; color: var(--sub);
  cursor: pointer; line-height: 1; padding: 2px 4px;
}
.mob-drawer-body { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
/* ── Collapsible drawer sections ── */
.mob-section-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 11px 16px; cursor: pointer; user-select: none;
  border-bottom: 1px solid var(--border); background: #fafafa;
}
.mob-section-title {
  font-family: 'Bebas Neue', cursive; font-size: 0.88rem;
  letter-spacing: 2px; color: var(--text);
  display: flex; align-items: center; gap: 8px;
}
.mob-section-chevron {
  color: var(--sub); transition: transform .2s; flex-shrink: 0;
}
.mob-section-head.open .mob-section-chevron { transform: rotate(180deg); }
.mob-section-body {
  display: none; border-bottom: 1px solid var(--border);
}
.mob-section-body.open { display: block; }
@media (max-width: 700px) {
  .sidebar { display: none; }
  .sidebar-fab { display: none; }
  .main-content { padding: 12px 10px 72px; max-width: 100%; }
  .team-group-badge { display: none; }
  .stand-table { min-width: 440px; }
  .mob-fab { display: flex; }
  .compare-grid { grid-template-columns: 1fr; }
  .section-export-head {
    margin: 0;
  }
}
@media (max-width: 480px) {
  .stand-table { min-width: 0; font-size: 0.72rem; }
  .stand-table th, .stand-table td { padding: 6px 7px; }
}
/* ── MODE CHECKBOX ─────────────────────── */
.sidebar-mode-label {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 12px;
  font-size: 0.72rem;
  color: var(--text);
  cursor: pointer;
  user-select: none;
  line-height: 1.5;
  width: 100%;
}
.sidebar-mode-label input {
  cursor: pointer;
  accent-color: var(--accent);
  flex-shrink: 0;
  margin-top: 2px;
}</style>
</head>
<body>

<div id="site-header"></div>
<script>injectHeader('selecoes','Ranking de Seleções');</script>

<div id="loading-overlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">Carregando dados...</div>
</div>

<main class="main-layout">

  <aside class="sidebar">
    <div class="sidebar-section-head" style="border-bottom:1px solid var(--border)">
      <span class="sidebar-section-title">Filtros</span>
      <button class="sidebar-close-btn" onclick="toggleSidebarVisibility()" title="Fechar menu">X</button>
    </div>
    <!-- Mode checkbox -->
    <div class="sidebar-section" style="border-bottom:1px solid var(--border)">
      <label class="sidebar-mode-label">
        <input type="checkbox" id="use-results" onchange="onModeChange(this)">
        <span>Substituir jogos já ocorridos por resultados reais</span>
      </label>
    </div>
    <!-- Group navigation -->
    <div class="sidebar-section">
      <div class="sidebar-section-head">
        <span class="sidebar-section-title">Grupos</span>
      </div>
      <div class="sidebar-tabs" id="group-tabs"></div>
    </div>
    <!-- Participant filter -->
    <div class="sidebar-section" style="flex:1;overflow:hidden;display:flex;flex-direction:column">
      <div class="sidebar-section-head">
        <span class="sidebar-section-title">Apostadores</span>
        <span class="sidebar-count" id="sidebar-count"></span>
      </div>
      <div class="sidebar-actions">
        <button class="sidebar-btn" onclick="selectAll()">Todos</button>
        <button class="sidebar-btn" onclick="selectNone()">Nenhum</button>
      </div>
      <div class="sidebar-list" id="participant-list"></div>
    </div>
  </aside>

  <div class="main-content" style="position:relative">
    <button class="sidebar-fab" id="sidebar-toggle-btn" onclick="toggleSidebarVisibility()" title="Exibir ou ocultar menu lateral">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      FILTROS
    </button>
    <div id="tables-container"></div>
  </div>

</main>

<!-- ── MOBILE FAB + DRAWER ──────────────── -->
<button class="mob-fab" id="mob-fab" onclick="openMobDrawer()">
  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  FILTROS
</button>
<div class="mob-overlay" id="mob-overlay" onclick="closeMobDrawer()"></div>
<div class="mob-drawer" id="mob-drawer">
  <div class="mob-drawer-handle">
    <span class="mob-drawer-title">FILTROS</span>
    <button class="mob-drawer-close" onclick="closeMobDrawer()">✕</button>
  </div>
  <div class="mob-drawer-body">
    <!-- Mode checkbox -->
    <div style="border-bottom:1px solid var(--border)">
      <label class="sidebar-mode-label">
        <input type="checkbox" id="use-results-mob" onchange="onModeChangeMob(this)">
        <span>Substituir jogos já ocorridos por resultados reais</span>
      </label>
    </div>
    <!-- Group navigation -->
    <div>
      <div class="mob-section-head open" onclick="toggleMobSection(this)">
        <span class="mob-section-title">Grupos</span>
        <svg class="mob-section-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6,9 12,15 18,9"/></svg>
      </div>
      <div class="mob-section-body open">
        <div class="sidebar-tabs" id="group-tabs-mob" style="flex-direction:row;flex-wrap:wrap;padding:8px 10px;gap:6px"></div>
      </div>
    </div>
    <!-- Participant filter -->
    <div style="flex:1;overflow:hidden;display:flex;flex-direction:column">
      <div class="mob-section-head open" onclick="toggleMobSection(this)">
        <span class="mob-section-title">
          Apostadores
          <span class="sidebar-count" id="sidebar-count-mob"></span>
        </span>
        <svg class="mob-section-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6,9 12,15 18,9"/></svg>
      </div>
      <div class="mob-section-body open">
        <div class="sidebar-actions">
          <button class="sidebar-btn" onclick="selectAll()">Todos</button>
          <button class="sidebar-btn" onclick="selectNone()">Nenhum</button>
        </div>
        <div class="sidebar-list" id="participant-list-mob" style="overflow-y:auto;max-height:260px"></div>
      </div>
    </div>
  </div>
</div>

<script src="bolao_utils.js"></script>
<script>
let JOGOS = [];

// ── Helpers ───────────────────────────────────────────────────────────────────
function fmt1(v) { return v.toFixed(1); }
function fmt2(v) { return v.toFixed(2); }
function fmtSG(v) {
  var s = v.toFixed(2);
  if (v > 0.005) return '+' + s;
  if (v < -0.005) return s;
  return '0.00';
}

// ── Module-level state (populated in init) ──────────────────────────────────
var allParticipants = [];
var groups = [];
var useActualResults = false;
var sidebarVisible = true;
var sidebarTouched = false;

function onModeChange(cb) {
  useActualResults = cb.checked;
  // keep both checkboxes in sync
  var chk0 = document.getElementById('use-results');
  var chkM = document.getElementById('use-results-mob');
  if (chk0) chk0.checked = cb.checked;
  if (chkM) chkM.checked = cb.checked;
  computeAllTeams();
  renderContent();
}
function onModeChangeMob(cb) { onModeChange(cb); }

function isMobileLayout() {
  return window.matchMedia('(max-width: 700px)').matches;
}

function isIntermediateLayout() {
  return window.matchMedia('(min-width: 701px) and (max-width: 1180px)').matches;
}

function applySidebarVisibility() {
  var layout = document.querySelector('.main-layout');
  var btn = document.getElementById('sidebar-toggle-btn');
  if (!layout || !btn) return;
  if (isMobileLayout()) {
    layout.classList.remove('sidebar-hidden');
    return;
  }
  layout.classList.toggle('sidebar-hidden', !sidebarVisible);
  btn.setAttribute('title', 'Exibir ou ocultar menu lateral');
  btn.classList.toggle('hidden', !isMobileLayout() && sidebarVisible);
}

function toggleSidebarVisibility() {
  if (isMobileLayout()) return;
  sidebarTouched = true;
  sidebarVisible = !sidebarVisible;
  applySidebarVisibility();
}

function syncSidebarByViewport() {
  if (sidebarTouched) {
    applySidebarVisibility();
    return;
  }
  sidebarVisible = !isIntermediateLayout();
  applySidebarVisibility();
}

// ── Mobile drawer ─────────────────────────────────────────────────────────────
function openMobDrawer() {
  document.getElementById('mob-drawer').classList.add('open');
  document.getElementById('mob-overlay').classList.add('open');

}
function closeMobDrawer() {

  document.getElementById('mob-overlay').classList.remove('open');

}
function toggleMobSection(headEl) {

// ── State ─────────────────────────────────────────────────────────────────────
var activeView = 'total'; // 'total', 'todos', or a group letter
var selectedParticipants = new Set();
var allTeams = [];
var allTeamsData = { teams: [], h2hPts: {} };
var teamMetaMap = {};
var teamOutcomeSort = { key: 'team', dir: 1 };
var bettorDiffSort = { key: 'hits', dir: -1 };

function buildTeamMetaMap() {
  teamMetaMap = {};
  JOGOS.forEach(function(j) {
    if (j.time_a && j.time_a.id !== undefined && j.time_a.id !== null) {
      teamMetaMap[j.time_a.id] = {
        id: j.time_a.id,
        nome: j.time_a.nome || '',
        logo: j.time_a.logo || '',
        grupo: j.grupo || ''
      };
    }
    if (j.time_b && j.time_b.id !== undefined && j.time_b.id !== null) {
      teamMetaMap[j.time_b.id] = {
        id: j.time_b.id,
        nome: j.time_b.nome || '',
        logo: j.time_b.logo || '',
        grupo: j.grupo || ''
      };
    }
  });
}

function addH2H(h2hPts, teamId, oppId, pts) {
  if (!h2hPts[teamId]) h2hPts[teamId] = {};
  h2hPts[teamId][oppId] = (h2hPts[teamId][oppId] || 0) + pts;
}

function h2hPoints(h2hPts, teamId, oppId) {
  if (!h2hPts || !h2hPts[teamId]) return 0;
  return h2hPts[teamId][oppId] || 0;
}

function computeTeamsData(participantSet, useActualFlag) {
  var teamsMap = {};
  var h2hPts = {};

  function getOrCreate(id, nome, logo, grupo) {
    if (!teamsMap[id]) teamsMap[id] = {
      id: id,
      nome: nome,
      logo: logo,
      grupo: grupo,
      jogos: 0,
      expV: 0,
      expE: 0,
      expD: 0,
      expGF: 0,
      expGC: 0
    };
    return teamsMap[id];
  }

  JOGOS.forEach(function(j) {
    var tA = getOrCreate(j.time_a.id, j.time_a.nome, j.time_a.logo, j.grupo);
    var tB = getOrCreate(j.time_b.id, j.time_b.nome, j.time_b.logo, j.grupo);

    if (useActualFlag && j.gols_a !== null && j.gols_b !== null) {
      var ptsA = j.gols_a > j.gols_b ? 3 : j.gols_a === j.gols_b ? 1 : 0;
      var ptsB = j.gols_b > j.gols_a ? 3 : j.gols_b === j.gols_a ? 1 : 0;
      var vA = ptsA === 3 ? 1 : 0;
      var e = ptsA === 1 ? 1 : 0;
      var vB = ptsB === 3 ? 1 : 0;

      tA.jogos++; tA.expV += vA; tA.expE += e; tA.expD += vB;
      tA.expGF += j.gols_a; tA.expGC += j.gols_b;
      tB.jogos++; tB.expV += vB; tB.expE += e; tB.expD += vA;
      tB.expGF += j.gols_b; tB.expGC += j.gols_a;

      addH2H(h2hPts, j.time_a.id, j.time_b.id, ptsA);
      addH2H(h2hPts, j.time_b.id, j.time_a.id, ptsB);
      return;
    }

    var fA = j.apostadores_a.filter(function(a) { return participantSet.has(a.nome); });
    var fE = j.apostadores_empate.filter(function(a) { return participantSet.has(a.nome); });
    var fB = j.apostadores_b.filter(function(a) { return participantSet.has(a.nome); });
    var nA = fA.length, nE = fE.length, nB = fB.length;
    var total = nA + nE + nB;
    if (total === 0) return;

    var allApostas = fA.concat(fE, fB);
    var sumGA = 0, sumGB = 0;
    allApostas.forEach(function(a) {
      var parts = (a.placar || '0x0').split('x');
      sumGA += (parseInt(parts[0], 10) || 0);
      sumGB += (parseInt(parts[1], 10) || 0);
    });

    var avgGA = sumGA / total;
    var avgGB = sumGB / total;
    var ptsAExp = (3 * nA + nE) / total;
    var ptsBExp = (3 * nB + nE) / total;

    tA.jogos++; tA.expV += nA / total; tA.expE += nE / total; tA.expD += nB / total;
    tA.expGF += avgGA; tA.expGC += avgGB;
    tB.jogos++; tB.expV += nB / total; tB.expE += nE / total; tB.expD += nA / total;
    tB.expGF += avgGB; tB.expGC += avgGA;

    addH2H(h2hPts, j.time_a.id, j.time_b.id, ptsAExp);
    addH2H(h2hPts, j.time_b.id, j.time_a.id, ptsBExp);
  });

  var teams = Object.values(teamsMap).map(function(t) {
    return Object.assign({}, t, { pts: t.expV * 3 + t.expE, sg: t.expGF - t.expGC });
  });

  return { teams: teams, h2hPts: h2hPts };
}

// ── Compute team stats from filtered apostas ──────────────────────────────────
function computeAllTeams() {
  allTeamsData = computeTeamsData(selectedParticipants, useActualResults);
  allTeams = allTeamsData.teams;
}

// ── Sort function: pts desc → sg desc → gf desc → alphabetical ──────────────
function sortTeams(arr, h2hPts) {
  var eps = 0.0001;
  return arr.slice().sort(function(a, b) {
    var dp = b.pts - a.pts;
    if (Math.abs(dp) > eps) return dp;

    // Criterio FIFA para empate em pontos: confronto direto (quando houver).
    var h2hA = h2hPoints(h2hPts, a.id, b.id);
    var h2hB = h2hPoints(h2hPts, b.id, a.id);
    if (Math.abs(h2hB - h2hA) > eps) return h2hB - h2hA;

    var ds = b.sg - a.sg;
    if (Math.abs(ds) > eps) return ds;
    var dg = b.expGF - a.expGF;
    if (Math.abs(dg) > eps) return dg;
    return a.nome.localeCompare(b.nome, 'pt-BR', { sensitivity: 'base' });
  });
}

function getQualifiedTeamIds(teams, h2hPts) {
  var qualified = new Set();
  var terceiros = [];

  groups.forEach(function(g) {
    var groupTeams = teams.filter(function(t) { return t.grupo === g; });
    var sortedGroup = sortTeams(groupTeams, h2hPts);
    if (sortedGroup[0]) qualified.add(sortedGroup[0].id);
    if (sortedGroup[1]) qualified.add(sortedGroup[1].id);
    if (sortedGroup[2]) terceiros.push(Object.assign({}, sortedGroup[2], { _grupo: g }));
  });

  sortTeams(terceiros, null).slice(0, 8).forEach(function(t) { qualified.add(t.id); });
  return qualified;
}

function teamChipHtml(teamId) {
  var t = teamMetaMap[teamId];
  if (!t) return '';
  var flag = t.logo
    ? '<img class="team-chip-flag" src="' + t.logo + '" alt="' + t.nome + '" loading="lazy">'
    : '<span class="team-chip-flag"></span>';
  return '<span class="team-chip">' + flag + '<span class="team-chip-name">' + t.nome + '</span></span>';
}

function teamChipListHtml(ids) {
  if (!ids.length) return '<span class="team-chip-empty">Nenhuma</span>';
  return '<div class="team-chip-list">' + ids.map(teamChipHtml).join('') + '</div>';
}

function exportButtonHtml(targetId, fileSuffix, title) {

  return '<div class="card-actions">' +
    '<button class="btn-img" onclick="exportById(\'' + targetId + '\', \'' + fileSuffix + '\')" title="' + btnTitle + '">' +
      '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">' +
        '<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>' +
        '<polyline points="7,10 12,15 17,10"/>' +
        '<line x1="12" y1="15" x2="12" y2="3"/>' +
      '</svg>' +
    '</button>' +
  '</div>';
}

function compareSummaryCardHtml(simQualified, realQualified) {
  var simAndReal = [];
  var notSimButReal = [];
  var simButNotReal = [];
  var notSimAndNotReal = [];

  Object.keys(teamMetaMap).forEach(function(id) {
    var inSim = simQualified.has(Number(id));
    var inReal = realQualified.has(Number(id));
    if (inSim && inReal) simAndReal.push(Number(id));
    else if (!inSim && inReal) notSimButReal.push(Number(id));
    else if (inSim && !inReal) simButNotReal.push(Number(id));
    else notSimAndNotReal.push(Number(id));
  });

  function byName(a, b) {
    var na = (teamMetaMap[a] || {}).nome || '';
    var nb = (teamMetaMap[b] || {}).nome || '';
    return na.localeCompare(nb, 'pt-BR', { sensitivity: 'base' });
  }

  simAndReal.sort(byName);
  notSimButReal.sort(byName);
  simButNotReal.sort(byName);
  notSimAndNotReal.sort(byName);

  return '<div class="card" id="export-comparativo">' +
    '<div class="card-head">' +
      '<div class="card-head-main"><span class="card-head-title">Comparativo Apostas x Realidade</span></div>' +
      exportButtonHtml('export-comparativo', 'comparativo-simulacao-realidade', 'Baixar tabela de comparativo') +
    '</div>' +
    '<div class="compare-grid">' +
      '<div class="compare-quad"><div class="compare-quad-title">Sim classificou · Real classificou</div>' + teamChipListHtml(simAndReal) + '</div>' +
      '<div class="compare-quad"><div class="compare-quad-title">Sim não classificou · Real classificou</div>' + teamChipListHtml(notSimButReal) + '</div>' +
      '<div class="compare-quad"><div class="compare-quad-title">Sim classificou · Real não classificou</div>' + teamChipListHtml(simButNotReal) + '</div>' +
      '<div class="compare-quad"><div class="compare-quad-title">Sim não classificou · Real não classificou</div>' + teamChipListHtml(notSimAndNotReal) + '</div>' +
    '</div>' +
  '</div>';
}

function bettorDiffCardHtml(realQualified) {
  var rowsData = allParticipants.map(function(nome) {
    var simData = computeTeamsData(new Set([nome]), false);
    var simQualified = getQualifiedTeamIds(simData.teams, simData.h2hPts);
    var missReal = [];
    var extraReal = [];
    var hits = 0;

    realQualified.forEach(function(id) {
      if (!simQualified.has(id)) missReal.push(id);
    });
    simQualified.forEach(function(id) {
      if (!realQualified.has(id)) extraReal.push(id);
    });
    Object.keys(teamMetaMap).forEach(function(idStr) {
      var id = Number(idStr);
      var inSim = simQualified.has(id);
      var inReal = realQualified.has(id);
      if (inSim === inReal) hits++;
    });

    function byName(a, b) {
      var na = (teamMetaMap[a] || {}).nome || '';
      var nb = (teamMetaMap[b] || {}).nome || '';
      return na.localeCompare(nb, 'pt-BR', { sensitivity: 'base' });
    }
    missReal.sort(byName);
    extraReal.sort(byName);

    return {
      nome: nome,
      hits: hits,
      missReal: missReal,
      extraReal: extraReal
    };
  });

  rowsData.sort(function(a, b) {
    if (bettorDiffSort.key === 'name') {
      return bettorDiffSort.dir * a.nome.localeCompare(b.nome, 'pt-BR', { sensitivity: 'base' });
    }
    if (a.hits !== b.hits) return bettorDiffSort.dir * (a.hits - b.hits);
    return a.nome.localeCompare(b.nome, 'pt-BR', { sensitivity: 'base' });
  });

  var rows = rowsData.map(function(r) {
    return '<tr>' +
      '<td class="diff-bettor">' + r.nome + '</td>' +
      '<td class="td-num td-center">' + r.hits + '</td>' +
      '<td>' + teamChipListHtml(r.missReal) + '</td>' +
      '<td>' + teamChipListHtml(r.extraReal) + '</td>' +
    '</tr>';
  }).join('');

  return '<div class="card" id="export-divergencia">' +
    '<div class="card-head">' +
      '<div class="card-head-main"><span class="card-head-title">Apostas x Resultados por Apostador</span></div>' +
      exportButtonHtml('export-divergencia', 'divergencia-por-apostador', 'Baixar tabela de divergência') +
    '</div>' +
    '<div class="diff-table-wrap">' +
      '<table class="diff-table">' +
        '<thead><tr>' +
          '<th class="sortable" onclick="setBettorDiffSort(\'name\')">Apostador' + bettorDiffSortIndicator('name') + '</th>' +
          '<th class="center sortable" onclick="setBettorDiffSort(\'hits\')">Número de acertos' + bettorDiffSortIndicator('hits') + '</th>' +
          '<th>Nas apostas NÃO classificaram e na realidade classificaram</th>' +
          '<th>Nas apostas classificaram e na realidade NÃO classificaram</th>' +
        '</tr></thead>' +
        '<tbody>' + rows + '</tbody>' +
      '</table>' +
    '</div>' +
  '</div>';
}

function setTeamOutcomeSort(key) {
  if (teamOutcomeSort.key === key) teamOutcomeSort.dir = -teamOutcomeSort.dir;
  else teamOutcomeSort = { key: key, dir: key === 'team' ? 1 : -1 };
  renderContent();
}

function setBettorDiffSort(key) {
  if (bettorDiffSort.key === key) bettorDiffSort.dir = -bettorDiffSort.dir;
  else bettorDiffSort = { key: key, dir: key === 'name' ? 1 : -1 };
  renderContent();
}

function outcomeSortIndicator(key) {
  if (teamOutcomeSort.key !== key) return '';
  return '<span class="sort-ind">' + (teamOutcomeSort.dir > 0 ? '▲' : '▼') + '</span>';
}

function bettorDiffSortIndicator(key) {
  if (bettorDiffSort.key !== key) return '';
  return '<span class="sort-ind">' + (bettorDiffSort.dir > 0 ? '▲' : '▼') + '</span>';
}

function perTeamOutcomeCardHtml(realQualified) {
  var rowsData = Object.keys(teamMetaMap).map(function(idStr) {
    var id = Number(idStr);
    var count = 0;
    allParticipants.forEach(function(nome) {
      var simData = computeTeamsData(new Set([nome]), false);
      var simQualified = getQualifiedTeamIds(simData.teams, simData.h2hPts);
      if (simQualified.has(id)) count++;
    });
    return {
      id: id,
      nome: (teamMetaMap[id] || {}).nome || '',
      count: count,
      finalQualified: realQualified.has(id)
    };
  });

  rowsData.sort(function(a, b) {
    if (teamOutcomeSort.key === 'team') {
      return teamOutcomeSort.dir * a.nome.localeCompare(b.nome, 'pt-BR', { sensitivity: 'base' });
    }
    if (teamOutcomeSort.key === 'count') {
      if (a.count !== b.count) return teamOutcomeSort.dir * (a.count - b.count);
      return a.nome.localeCompare(b.nome, 'pt-BR', { sensitivity: 'base' });
    }
    if (teamOutcomeSort.key === 'final') {
      var av = a.finalQualified ? 1 : 0;
      var bv = b.finalQualified ? 1 : 0;
      if (av !== bv) return teamOutcomeSort.dir * (av - bv);
      return a.nome.localeCompare(b.nome, 'pt-BR', { sensitivity: 'base' });
    }
    return 0;
  });

  var body = rowsData.map(function(r) {
    var t = teamMetaMap[r.id] || {};
    var flag = t.logo
      ? '<img class="team-flag" src="' + t.logo + '" alt="' + t.nome + '" loading="lazy">'
      : '<div class="team-flag" style="background:var(--border)"></div>';
    var statusLabel = r.finalQualified ? 'Classificada' : 'Não classificada';
    var statusClass = r.finalQualified ? 'status-badge status-badge-ok' : 'status-badge status-badge-no';
    return '<tr>' +
      '<td class="td-team"><div class="team-cell">' + flag + '<span class="team-name">' + r.nome + '</span></div></td>' +
      '<td class="td-num td-center">' + r.count + '</td>' +
      '<td class="td-center"><span class="' + statusClass + '">' + statusLabel + '</span></td>' +
    '</tr>';
  }).join('');

  return '<div class="card" id="export-selecao-apostadores">' +
    '<div class="card-head">' +
      '<div class="card-head-main"><span class="card-head-title">Seleção x Apostadores x Resultado Final</span></div>' +
      exportButtonHtml('export-selecao-apostadores', 'selecao-apostadores-resultado-final', 'Baixar tabela de seleção x apostadores') +
    '</div>' +
    '<div class="stand-wrap">' +
      '<table class="stand-table outcome-table">' +
        '<thead><tr>' +
          '<th class="left sortable" onclick="setTeamOutcomeSort(\'team\')">Seleção' + outcomeSortIndicator('team') + '</th>' +
          '<th class="center sortable" onclick="setTeamOutcomeSort(\'count\')" title="Quantidade de apostadores que classificavam a seleção">Qtd. que classificavam' + outcomeSortIndicator('count') + '</th>' +
          '<th class="center sortable" onclick="setTeamOutcomeSort(\'final\')">Resultado final' + outcomeSortIndicator('final') + '</th>' +
        '</tr></thead>' +
        '<tbody>' + body + '</tbody>' +
      '</table>' +
    '</div>' +
  '</div>';
}

// ── Build a standings table card ──────────────────────────────────────────────
// showInfo: show the info strip; showSubtitle: show subtitle in card-head
// mode: 'group' (highlight top-2 blue, 3rd amber), 'terceiros' (highlight top-8 blue), 'geral' (no highlight)
function tableCardHtml(title, subtitle, teamsArr, showGroup, showInfo, showSubtitle, mode) {

  var exportBtn = '';

    cardId = ' id="' + arguments[7].targetId + '"';
    exportBtn = exportButtonHtml(arguments[7].targetId, arguments[7].fileSuffix, arguments[7].title);
  }
  var sorted = sortTeams(teamsArr, mode === 'group' ? allTeamsData.h2hPts : null);
  var rows = sorted.map(function(t, i) {

    if (mode === 'group') {
      if (pos <= 2) rc = 'rank-q';
      else if (pos === 3) rc = 'rank-3rd';
    } else if (mode === 'terceiros') {
      if (pos <= 8) rc = 'rank-top8';
    }
    return rowHtml(t, pos, showGroup, rc);
  }).join('');

  return '<div class="card"' + cardId + '>' +
    '<div class="card-head">' +

        ? '<strong style="color:var(--text)">Resultados reais</strong> usados para jogos encerrados · jogos futuros usam palpites dos apostadores selecionados. Desempate: Pontos → Saldo → Gols pró.'
        : '<strong style="color:var(--text)">Valores esperados</strong> calculados a partir das apostas: pontos = vitórias × 3 + empates; saldo = gols pró − gols contra. Desempate: Pontos → Saldo → Gols pró.') +
    '</div>' : '') +
    '<div class="stand-wrap">' +
      '<table class="stand-table">' +
        '<thead><tr>' +
          '<th class="center">#</th>' +
          '<th class="left">Seleção</th>' +
          '<th title="Jogos">J</th>' +
          '<th title="Vitórias esperadas">V</th>' +
          '<th title="Empates esperados">E</th>' +
          '<th title="Derrotas esperadas">D</th>' +
          '<th title="Gols pró esperados">GP</th>' +
          '<th title="Gols contra esperados">GC</th>' +
          '<th title="Saldo de gols esperado">SG</th>' +
          '<th title="Pontos esperados">Pts</th>' +
        '</tr></thead>' +
        '<tbody>' + rows + '</tbody>' +
      '</table>' +
    '</div>' +
  '</div>';
}

// ── Render content area ───────────────────────────────────────────────────────
function renderContent() {
  var container = document.getElementById('tables-container');
  var html = '';

  if (activeView === 'total') {
    html = tableCardHtml(
      'Classificação Geral',
      'Todas as seleções · ' + allTeams.length + ' equipes',
      allTeams,
      true,
      true,
      true,
      'geral',
      { targetId: 'export-geral', fileSuffix: 'geral', title: 'Baixar classificação geral' }
    );
  } else if (activeView === 'todos') {
    var validGroups = groups.filter(function(g) {
      if (!g) return false;
      return allTeams.some(function(t) { return t.grupo === g; });
    });
    // One compact card per group (no info strip, no subtitle)
    var groupCards = validGroups.map(function(g) {
      var groupTeams = allTeams.filter(function(t) { return t.grupo === g; });
      return tableCardHtml('Grupo ' + g, '', groupTeams, false, false, false, 'group');
    }).join('');
    // Best 3rd-place teams card
    var terceiros = validGroups.map(function(g) {
      var groupTeams = sortTeams(allTeams.filter(function(t) { return t.grupo === g; }), allTeamsData.h2hPts);
      return groupTeams[2] ? Object.assign({}, groupTeams[2], { _grupo: g }) : null;
    }).filter(Boolean);
    var terceirosCard = tableCardHtml(
      'Melhores 3º Colocados',
      'Top 8 avançam — critério: Pontos → Saldo de gols → Gols pró',
      terceiros, true, false, true, 'terceiros'
    );
    // Comparativos simulacao vs realidade (sempre simulacao pura x resultados reais).
    var simData = computeTeamsData(selectedParticipants, false);
    var simQualified = getQualifiedTeamIds(simData.teams, simData.h2hPts);
    var realData = computeTeamsData(new Set(allParticipants), true);
    var realQualified = getQualifiedTeamIds(realData.teams, realData.h2hPts);

    var summaryCard = compareSummaryCardHtml(simQualified, realQualified);
    var bettorDiffCard = bettorDiffCardHtml(realQualified);
    var perTeamCard = perTeamOutcomeCardHtml(realQualified);

    html = '<div class="todos-groups-wrap">' +
      '<div class="section-export-head">' +
        '<span class="section-export-title">Grupos e Melhores 3º colocados</span>' +
        exportButtonHtml('export-grupos-terceiros', 'grupos-e-melhores-terceiros', 'Baixar grupos e melhores terceiros') +
      '</div>' +
      '<div id="export-grupos-terceiros" class="group-export-stack">' + groupCards + terceirosCard + '</div>' +
      summaryCard + bettorDiffCard + perTeamCard +
    '</div>';
  }

  container.innerHTML = html;
}

// ── Switch view ───────────────────────────────────────────────────────────────
function switchView(view) {
  activeView = view;
  renderTabs();
  renderContent();
}

// ── Sidebar ─────────────────────────────────────────────────────────────
function renderSidebar() {
  var html = allParticipants.map(function(p) {
    var chk = selectedParticipants.has(p) ? ' checked' : '';
    return '<label class="p-check"><input type="checkbox" value="' +
      p.replace(/"/g, '&quot;') + '"' + chk + ' onchange="toggleParticipant(this)"> ' + p + '</label>';
  }).join('');
  document.getElementById('participant-list').innerHTML     = html;
  document.getElementById('participant-list-mob').innerHTML = html;
  var badge = selectedParticipants.size + ' / ' + allParticipants.length;
  document.getElementById('sidebar-count').textContent     = badge;
  document.getElementById('sidebar-count-mob').textContent = badge;
}

function toggleParticipant(cb) {
  if (cb.checked) selectedParticipants.add(cb.value);
  else selectedParticipants.delete(cb.value);
  // keep both lists in sync
  ['participant-list', 'participant-list-mob'].forEach(function(listId) {
    var el = document.getElementById(listId);
    if (!el) return;
    el.querySelectorAll('input[type=checkbox]').forEach(function(input) {
      input.checked = selectedParticipants.has(input.value);
    });
  });
  var badge = selectedParticipants.size + ' / ' + allParticipants.length;
  document.getElementById('sidebar-count').textContent     = badge;
  document.getElementById('sidebar-count-mob').textContent = badge;
  computeAllTeams();
  renderContent();
}

function selectAll() {
  selectedParticipants = new Set(allParticipants);
  renderSidebar(); computeAllTeams(); renderContent();
}

function selectNone() {
  selectedParticipants = new Set();
  renderSidebar(); computeAllTeams(); renderContent();
}

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  try {
    JOGOS = await buildJogos();
  } catch(e) {
    document.getElementById('loading-overlay').innerHTML =
      '<div class="loading-text">Erro ao carregar dados. Tente recarregar a página.</div>';
    return;
  }
  document.getElementById('loading-overlay').style.display = 'none';
  var seen1 = {}, seen2 = {};
  JOGOS.forEach(function(j) {
    [].concat(j.apostadores_a, j.apostadores_empate, j.apostadores_b).forEach(function(a) {
      if (!seen1[a.nome]) { seen1[a.nome] = true; allParticipants.push(a.nome); }
    });
    if (!seen2[j.grupo]) { seen2[j.grupo] = true; groups.push(j.grupo); }
  });
  allParticipants.sort(function(a, b) { return a.localeCompare(b, 'pt-BR', { sensitivity: 'base' }); });
  groups.sort();
  buildTeamMetaMap();
  selectedParticipants = new Set(allParticipants);
  computeAllTeams();
  renderSidebar();
  renderTabs();
  renderContent();
  syncSidebarByViewport();
  window.addEventListener('resize', syncSidebarByViewport);
}
init();

// ── Image export ───────────────────────────────────────────────────────────────
function imgToDataURL(img) {
  return new Promise(function(resolve) {
    if (!img.src || img.src.startsWith('data:')) { resolve(); return; }
    var original = img.src;
    var size = 48; // 24px * scale:2
    var canvas = document.createElement('canvas');
    canvas.width = size;
    canvas.height = size;
    var ctx = canvas.getContext('2d');
    var ci = new Image();
    ci.crossOrigin = 'anonymous';
    ci.onload = function() {
      var iw = ci.naturalWidth  || ci.width;
      var ih = ci.naturalHeight || ci.height;
      var scale = Math.max(size / iw, size / ih);
      var sw = iw * scale;
      var sh = ih * scale;
      var sx = (size - sw) / 2;
      var sy = (size - sh) / 2;
      try {
        ctx.drawImage(ci, sx, sy, sw, sh);
        img.src = canvas.toDataURL('image/png');
      } catch(e) {
        img.style.visibility = 'hidden';
      }
      resolve();
    };
    ci.onerror = function() { img.style.visibility = 'hidden'; resolve(); };
    ci.src = original + (original.includes('?') ? '&' : '?') + '_cb=' + Date.now();
  });
}

function exportById(targetId, fileSuffix) {
  var container = document.getElementById(targetId);
  if (!container) return;
  var fname = 'bolao_selecoes_' + fileSuffix + '.png';
  var imgs = Array.from(container.querySelectorAll('img.team-flag, img.team-chip-flag'));
  var origSrcs = imgs.map(function(img) { return img.src; });
  Promise.all(imgs.map(imgToDataURL)).then(function() {
    html2canvas(container, {
      scale: 2,
      useCORS: false,
      allowTaint: false,
      backgroundColor: '#f0f2f5',
      logging: false
    }).then(function(canvas) {
      imgs.forEach(function(img, i) {
        img.src = origSrcs[i];
        img.style.visibility = '';
      });
      var a = document.createElement('a');
      a.download = fname;
      a.href = canvas.toDataURL('image/png');
      a.click();
    });
  });
}

function exportImage() {
  if (activeView === 'todos') {
    exportById('export-grupos-terceiros', 'grupos-e-melhores-terceiros');
    return;
  }
  exportById('export-geral', 'geral');
}
